/* ═══════════════════════════════════════════════════════════════════════
   PRICING ALGORITHMS
   ═══════════════════════════════════════════════════════════════════════ */

function compBased(listing, comps) {
  const avgPSF = comps.reduce((s,c)=>s+c.pricePerSqft,0)/comps.length;
  let base = avgPSF * listing.sqft;
  const adj = [];
  const age = 2026-listing.yearBuilt;
  if(age>30){base*=0.96;adj.push({l:"Age >30 yrs",p:-4});}
  else if(age>15){base*=0.98;adj.push({l:"Age 15-30 yrs",p:-2});}
  if(listing.daysOnMarket>90){base*=0.95;adj.push({l:"On market >90 days (stale)",p:-5});}
  else if(listing.daysOnMarket>60){base*=0.97;adj.push({l:"On market >60 days",p:-3});}
  else if(listing.daysOnMarket>30){base*=0.99;adj.push({l:"On market >30 days",p:-1});}
  if(listing.priceReductions.length>=3){base*=0.97;adj.push({l:"3+ price cuts (motivated)",p:-3});}
  else if(listing.priceReductions.length>=1){base*=0.99;adj.push({l:"Price reduced",p:-1});}
  if(listing.floodRisk==="High"){base*=0.93;adj.push({l:"High flood risk zone",p:-7});}
  else if(listing.floodRisk==="Moderate"){base*=0.97;adj.push({l:"Moderate flood risk",p:-3});}
  if(listing.foreclosure){base*=0.90;adj.push({l:"Foreclosure / bank-owned",p:-10});}
  if(listing.lisPendens){base*=0.97;adj.push({l:"Lis pendens filed",p:-3});}
  if(listing.permits.open>0){base*=(1-listing.permits.open*0.015);adj.push({l:listing.permits.open+" open permit(s)",p:-(listing.permits.open*1.5)});}
  if(listing.windZone==="HVHZ"){base*=0.95;adj.push({l:"HVHZ wind zone (hurricane zone)",p:-5});}
  else if(listing.windZone==="Coastal"){base*=0.97;adj.push({l:"Coastal wind zone",p:-3});}
  else if(listing.windZone==="HVHZ-Adjacent"){base*=0.98;adj.push({l:"HVHZ-Adjacent wind zone",p:-2});}
  base*=MARKET.listToSaleRatio;
  adj.push({l:"Market list-to-sale ratio ("+((MARKET.listToSaleRatio*100).toFixed(1))+"%)",p:-((1-MARKET.listToSaleRatio)*100)});
  return {price:Math.round(base),avgPSF:avgPSF.toFixed(2),baseRaw:Math.round(avgPSF*listing.sqft),adj};
}

function multiFactor(listing) {
  const f=[];let ts=0,tw=0;
  const add=(name,score,weight,detail)=>{f.push({name,score,weight,detail});ts+=score*weight;tw+=weight;};
  const ptr=listing.price/listing.taxAssessed;
  add("Price vs Tax Assessed",ptr>1.2?30:ptr>1.1?50:ptr>1.0?70:90,15,
    "Listed "+((ptr-1)*100).toFixed(1)+"% "+(ptr>=1?"above":"below")+" assessed ($"+listing.taxAssessed.toLocaleString()+")");
  add("Days on Market",listing.daysOnMarket<14?40:listing.daysOnMarket<30?55:listing.daysOnMarket<60?70:listing.daysOnMarket<90?80:95,12,
    listing.daysOnMarket+" days (area avg: "+MARKET.avgDaysOnMarket+")");
  const tr=listing.originalPrice-listing.price;
  add("Price Reduction History",listing.priceReductions.length===0?40:listing.priceReductions.length===1?60:listing.priceReductions.length===2?75:90,10,
    listing.priceReductions.length+" cut(s), $"+tr.toLocaleString()+" off ("+((tr/listing.originalPrice)*100).toFixed(1)+"%)");
  add("Flood Zone Risk",listing.floodRisk==="Minimal"?30:listing.floodRisk==="Moderate"?60:90,12,
    "Zone "+listing.floodZone+" — "+listing.floodRisk+" (FEMA: "+listing.femaPanel+")");
  add("Crime Index",listing.crimeScore<25?30:listing.crimeScore<40?45:listing.crimeScore<55?60:listing.crimeScore<70?75:90,10,
    "Score "+listing.crimeScore+"/100 — Grade "+listing.crimeGrade);
  add("Open Permits",listing.permits.open===0?20:listing.permits.open===1?55:listing.permits.open===2?75:95,8,
    listing.permits.open+" open, "+listing.permits.closed+" closed");
  add("Foreclosure / Lis Pendens",(!listing.foreclosure&&!listing.lisPendens)?20:(listing.lisPendens&&!listing.foreclosure)?65:listing.foreclosure?90:50,10,
    "Foreclosure: "+(listing.foreclosure?"Yes":"No")+" | Lis Pendens: "+(listing.lisPendens?"Yes":"No"));
  let apS=50;
  if(listing.previousSales.length>0){
    const ls=listing.previousSales[0];const ya=2026-parseInt(ls.date.split("-")[0]);
    const aa=ya>0?((listing.price/ls.price)**(1/ya)-1)*100:0;
    apS=aa>8?85:aa>5?65:aa>3?50:35;
    add("Annual Appreciation",apS,8,aa.toFixed(1)+"%/yr since $"+ls.price.toLocaleString()+" in "+ls.date.split("-")[0]);
  } else { add("Annual Appreciation",50,8,"No previous sale data"); }
  add("Market Conditions",MARKET.monthlyInventory>5?85:MARKET.monthlyInventory>3?65:MARKET.monthlyInventory>2?45:30,8,
    MARKET.monthlyInventory+" mo inventory, "+(MARKET.priceChangeYoY>0?"+":"")+MARKET.priceChangeYoY+"% YoY");
  add("Listing History",listing.previousListings===0?30:listing.previousListings===1?50:listing.previousListings===2?70:90,7,
    "Listed "+(listing.previousListings+1)+" time(s) total");
  const wz=listing.windZone||"Inland";
  add("Wind Zone Risk",wz==="HVHZ"?90:wz==="Coastal"?70:wz==="HVHZ-Adjacent"?55:30,10,
    wz+" zone — Design wind speed: "+(listing.windSpeed||130)+" mph");
  const cs=ts/tw;
  const dp=Math.max(0,Math.min(18,(cs-20)*0.257));
  return {score:cs.toFixed(1),discPct:dp.toFixed(1),price:Math.round(listing.price*(1-dp/100)),factors:f};
}

function reconcile(cp,fp,listing){
  const avg=Math.round((cp+fp)/2),lo=Math.min(cp,fp),hi=Math.max(cp,fp),sp=hi-lo;
  const conf=sp<listing.price*0.03?"High":sp<listing.price*0.06?"Moderate":"Low";
  return {rec:avg,lo,hi,sp,conf,save:listing.price-avg,savePct:((listing.price-avg)/listing.price*100).toFixed(1)};
}

      <div style={{maxWidth:1000,margin:"0 auto",padding:"24px"}}>
        <div className="card" style={{padding:20,marginBottom:24}}>
          <h3 style={{fontSize:13,fontWeight:600,color:"#374151",marginTop:0,marginBottom:12}}>📊 Area Market Snapshot</h3>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:16}}>
            {[
              {l:"Median Price",v:"$"+MARKET.medianPrice.toLocaleString()},
              {l:"Avg $/sqft",v:"$"+MARKET.avgPricePerSqft},
              {l:"Active Listings",v:MARKET.activeListings},
              {l:"Avg Days on Market",v:MARKET.avgDaysOnMarket},
              {l:"Inventory (months)",v:MARKET.monthlyInventory},
              {l:"Price Change YoY",v:(MARKET.priceChangeYoY>0?"+":"")+MARKET.priceChangeYoY+"%",c:MARKET.priceChangeYoY<0?"#dc2626":"#16a34a"},
              {l:"Sold Last 30 Days",v:MARKET.soldLastMonth},
              {l:"List-to-Sale Ratio",v:(MARKET.listToSaleRatio*100).toFixed(1)+"%"},
            ].map((s,i)=>(
              <div key={i}>
                <p style={{fontSize:11,color:"#6b7280",margin:0}}>{s.l}</p>
                <p style={{fontSize:18,fontWeight:700,color:s.c||"#111827",margin:"2px 0 0"}}>{s.v}</p>
              </div>
            ))}
          </div>
        </div>

        {filteredListings.length === 0 && (
          <div className="card" style={{padding:40,textAlign:"center"}}>
            <p style={{fontSize:18,color:"#6b7280",margin:0}}>No properties match your search criteria.</p>
            <p style={{fontSize:13,color:"#9ca3af",margin:"8px 0 0"}}>Try broadening your search — adjust city, price, or property type.</p>
            <button onClick={()=>setStep("input")} style={{marginTop:16,background:"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
              Modify Search
            </button>
          </div>
        )}

        {filteredListings.map(l=>{
          const mf=multiFactor(l);
          return (
            <div key={l.id} className="card card-hover" style={{padding:20,marginBottom:16,position:"relative"}} onClick={()=>{setSel(l);setTaxParcelId("");setLegalDescription("");setStep("analysis");}}>
              <button onClick={(e)=>{e.stopPropagation();setFavorites(prev=>prev.includes(l.id)?prev.filter(fid=>fid!==l.id):[...prev,l.id]);}}
                style={{position:"absolute",top:12,right:12,background:"none",border:"none",fontSize:22,cursor:"pointer",zIndex:10,padding:4,lineHeight:1}}
                title={favorites.includes(l.id)?"Remove from saved":"Save property"}>
                {favorites.includes(l.id)? <span style={{color:"#dc2626"}}>&#9829;</span> : <span style={{color:"#d1d5db"}}>&#9825;</span>}
              </button>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                    <h3 style={{fontSize:16,fontWeight:700,color:"#111827",margin:0}}>{l.address}</h3>
                    {l.foreclosure && <span className="badge badge-red">Foreclosure</span>}
                    {l.lisPendens && <span className="badge badge-orange">Lis Pendens</span>}
                    {l.daysOnMarket>60 && <span className="badge badge-yellow">Stale Listing</span>}
                    {l.floodRisk==="High" && <span className="badge badge-red">Flood Zone</span>}
                  </div>
                  <p style={{fontSize:13,color:"#6b7280",margin:"0 0 8px"}}>{l.city}, {l.state} {l.zip} — {l.type}</p>
                  <div style={{display:"flex",gap:16,fontSize:13,color:"#4b5563"}}>
                    <span>{l.beds} bed</span><span>{l.baths} bath</span><span>{l.sqft.toLocaleString()} sqft</span>
                    <span>Built {l.yearBuilt}</span>
                    <span style={{display:"flex",alignItems:"center",gap:3}}><ClockIcon/> {l.daysOnMarket} days</span>
                  </div>
                  <p className="line-clamp-1" style={{fontSize:12,color:"#9ca3af",marginTop:8}}>{l.description}</p>
                </div>
                <div style={{textAlign:"right",marginLeft:24,flexShrink:0}}>
                  <p style={{fontSize:20,fontWeight:700,color:"#111827",margin:0}}>${l.price.toLocaleString()}</p>
                  <p style={{fontSize:12,color:"#9ca3af",margin:"2px 0"}}>${(l.price/l.sqft).toFixed(0)}/sqft</p>
                  {l.originalPrice>l.price && <p style={{fontSize:12,color:"#ef4444",textDecoration:"line-through",margin:0}}>${l.originalPrice.toLocaleString()}</p>}
                  <div style={{background:"#eff6ff",borderRadius:8,padding:"6px 12px",marginTop:8}}>
                    <p style={{fontSize:11,color:"#2563eb",fontWeight:500,margin:0}}>Negotiation Score</p>
                    <p style={{fontSize:20,fontWeight:700,color:"#1e40af",margin:0}}>{mf.score}</p>
                  </div>
                  <p style={{fontSize:12,color:"#2563eb",fontWeight:500,marginTop:6}}>Full Analysis →</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
    );
  }

  // ─── SCREEN: FAVORITES ──────────────────────────────────────────────
  if (step==="favorites") {
    const favListings = LISTINGS.filter(l => favorites.includes(l.id));
    return (
      <div className="gradient-bg min-h-screen">
        <header style={{background:"#fff",borderBottom:"1px solid #e5e7eb",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
          <div style={{maxWidth:1000,margin:"0 auto",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{background:"#dc2626",borderRadius:10,padding:8,display:"flex"}}><HomeIcon/></div>
              <div><h1 style={{fontSize:20,fontWeight:700,margin:0,color:"#111827"}}>My Saved Properties</h1>
              <p style={{fontSize:13,color:"#6b7280",margin:0}}>{favListings.length} saved propert{favListings.length===1?"y":"ies"}</p></div>
            </div>
            <button onClick={()=>setStep("results")} style={{background:"none",border:"none",color:"#2563eb",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
              <ChevLeft/> Back to Results
            </button>
          </div>
        </header>
        <div style={{maxWidth:1000,margin:"0 auto",padding:"24px"}}>
          {favListings.length===0 && (
            <div className="card" style={{padding:48,textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:16}}>{"❤️"}</div>
              <h3 style={{fontSize:18,fontWeight:600,color:"#374151",margin:"0 0 8px"}}>No saved properties yet</h3>
              <p style={{fontSize:14,color:"#6b7280",margin:"0 0 20px"}}>Click the heart icon on any property to save it for later.</p>
              <button onClick={()=>setStep("results")} style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                Browse Properties
              </button>
            </div>
          )}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
            {favListings.map(l=>{
              const ppsqft = (l.price/l.sqft).toFixed(0);
              return (
                <div key={l.id} className="card" style={{overflow:"hidden"}}>
                  <div style={{height:120,background:"linear-gradient(135deg,#dbeafe,#eff6ff)",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <HomeIcon s={48} c="#93c5fd"/>
                  </div>
                  <div style={{padding:16}}>
                    <h3 style={{fontSize:15,fontWeight:700,color:"#111827",margin:"0 0 2px"}}>{l.address}</h3>
                    <p style={{fontSize:12,color:"#6b7280",margin:"0 0 8px"}}>{l.city}, {l.state} {l.zip}</p>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                      <span style={{fontSize:20,fontWeight:700,color:"#111827"}}>${l.price.toLocaleString()}</span>
                      <span style={{fontSize:12,color:"#6b7280"}}>${ppsqft}/sqft</span>
                    </div>
                    <div style={{display:"flex",gap:12,fontSize:12,color:"#4b5563",marginBottom:10}}>
                      <span>{l.beds} bed</span><span>{l.baths} bath</span><span>{l.sqft.toLocaleString()} sqft</span>
                    </div>
                    {l.features && l.features.length>0 && (
                      <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:12}}>
                        {l.features.map((f,i)=>(
                          <span key={i} className="badge badge-blue" style={{fontSize:10}}>{f}</span>
                        ))}
                      </div>
                    )}
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>{setFavorites(prev=>prev.filter(fid=>fid!==l.id));}}
                        style={{flex:1,background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                        Remove
                      </button>
                      <button onClick={()=>{setSel(l);setTaxParcelId("");setLegalDescription("");setStep("analysis");}}
                        style={{flex:1,background:"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                        View Analysis
                      </button>
                      <button onClick={()=>setShowShowingModal(l.id)}
                        style={{flex:1,background:"#16a34a",color:"#fff",border:"none",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                        Request Showing
                      </button>
                    </div>
                  </div>
                  {showShowingModal===l.id && (
                    <div className="modal-overlay" onClick={()=>setShowShowingModal(null)}>
                      <div className="modal-card" onClick={e=>e.stopPropagation()}>
                        <div style={{textAlign:"center",marginBottom:20}}>
                          <div style={{fontSize:36,marginBottom:8}}>{"🏠"}</div>
                          <h2 style={{fontSize:18,fontWeight:700,color:"#111827",margin:"0 0 4px"}}>Showing Request Sent!</h2>
                          <p style={{fontSize:13,color:"#6b7280",margin:0}}>Your request to view {l.address} has been submitted.</p>
                        </div>
                        <div style={{background:"#f9fafb",borderRadius:8,padding:16,marginBottom:16}}>
                          <p style={{fontSize:13,color:"#374151",margin:"0 0 8px"}}><strong>Property:</strong> {l.address}, {l.city}, {l.state} {l.zip}</p>
                          <p style={{fontSize:13,color:"#374151",margin:"0 0 8px"}}><strong>List Price:</strong> ${l.price.toLocaleString()}</p>
                          <p style={{fontSize:13,color:"#374151",margin:0}}><strong>Listing Agent Contact:</strong> Contact listing agent at (813) 555-0{String(l.id).padStart(3,"0")}</p>
                        </div>
                        <p style={{fontSize:12,color:"#6b7280",margin:"0 0 16px",textAlign:"center"}}>A representative will contact you within 24 hours to schedule your showing.</p>
                        <button onClick={()=>setShowShowingModal(null)} className="modal-btn" style={{background:"#2563eb",color:"#fff"}}>
                          Close
                        </button>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // ─── SCREEN 3: ANALYSIS ────────────────────────────────────────────
  if (step==="analysis" && sel) {
    const l=sel;
    const cityComps = getCompsForCity(l.city);
    const ca=compBased(l,cityComps);
    const mf=multiFactor(l);
    const of=reconcile(ca.price,mf.price,l);
    const loan=of.rec-form.downPayment;
    const mr=0.0685/12, np=360;
    const mp=loan*(mr*Math.pow(1+mr,np))/(Math.pow(1+mr,np)-1);
    const mt=l.annualTax/12;
    const mi=l.floodRisk==="High"?380:l.floodRisk==="Moderate"?220:150;
    const tot=mp+mt+mi+l.hoa;

    return (
      <div className="gradient-bg min-h-screen">
        <header className="no-print" style={{background:"#fff",borderBottom:"1px solid #e5e7eb",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
          <div style={{maxWidth:1100,margin:"0 auto",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{background:"#2563eb",borderRadius:10,padding:8,display:"flex"}}><HomeIcon/></div>
              <div><h1 style={{fontSize:20,fontWeight:700,margin:0,color:"#111827"}}>{l.address}</h1>
              <p style={{fontSize:13,color:"#6b7280",margin:0}}>{l.city}, {l.state} {l.zip}</p></div>
            </div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>setStep("results")} style={{background:"none",border:"none",color:"#2563eb",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                <ChevLeft/> Back to Results
              </button>
              <button onClick={()=>{
                handleGenerateOffer(l);
              }}
                style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                Generate Offer Letter
              </button>
            </div>
          </div>
        </header>

        <div style={{maxWidth:1100,margin:"0 auto",padding:"24px",display:"flex",flexDirection:"column",gap:24}}>

          {/* HERO: SUGGESTED OFFER */}
          <div className="card" style={{overflow:"hidden"}}>
            <div className="gradient-hero" style={{padding:"24px 32px",color:"#fff"}}>
              <p style={{fontSize:12,fontWeight:500,opacity:0.7,margin:"0 0 4px",letterSpacing:1}}>AI-POWERED SUGGESTED OFFER</p>
              <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
                <div>
                  <p style={{fontSize:38,fontWeight:700,margin:0}}>${of.rec.toLocaleString()}</p>
                  <p style={{fontSize:13,opacity:0.7,margin:"4px 0 0"}}>List: ${l.price.toLocaleString()} — Save ${of.save.toLocaleString()} ({of.savePct}%) — <strong>${(l.price/l.sqft).toFixed(0)}/sqft</strong></p>
                </div>
                <div style={{display:"flex",gap:32,textAlign:"right"}}>
                  <div><p style={{fontSize:11,opacity:0.5,margin:0}}>Low Estimate</p><p style={{fontSize:18,fontWeight:600,margin:0}}>${of.lo.toLocaleString()}</p></div>
                  <div><p style={{fontSize:11,opacity:0.5,margin:0}}>High Estimate</p><p style={{fontSize:18,fontWeight:600,margin:0}}>${of.hi.toLocaleString()}</p></div>
                  <div><p style={{fontSize:11,opacity:0.5,margin:0}}>Confidence</p>
                    <p style={{fontSize:18,fontWeight:600,margin:0,color:of.conf==="High"?"#86efac":of.conf==="Moderate"?"#fde68a":"#fca5a5"}}>{of.conf}</p></div>
                </div>
              </div>
            </div>
            <div style={{padding:"16px 32px",background:"#eff6ff",borderTop:"1px solid #bfdbfe",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:16,textAlign:"center"}}>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Down Payment</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${form.downPayment.toLocaleString()}</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Loan Amount</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${loan.toLocaleString()}</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Monthly P&I</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${Math.round(mp).toLocaleString()}</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Tax+Ins+HOA</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${Math.round(mt+mi+l.hoa).toLocaleString()}/mo</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Total Monthly</p><p style={{fontSize:16,fontWeight:700,color:"#1e40af",margin:"2px 0 0"}}>${Math.round(tot).toLocaleString()}/mo</p></div>
            </div>
          </div>

          {/* TWO METHODS */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
            <div className="card" style={{padding:24}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#111827",marginTop:0,marginBottom:16}}>Method 1: Comparable Sales</h3>
              <div style={{background:"#f9fafb",borderRadius:8,padding:16,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#6b7280"}}>Base (avg comp $/sqft x sqft)</span>
                  <span style={{fontSize:14,fontWeight:600}}>${ca.baseRaw.toLocaleString()}</span>
                </div>
                <p style={{fontSize:11,color:"#9ca3af",margin:"0 0 12px"}}>Avg comp: ${ca.avgPSF}/sqft x {l.sqft.toLocaleString()} sqft</p>
                {ca.adj.map((a,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #e5e7eb"}}>
                    <span style={{fontSize:12,color:"#4b5563"}}>{a.l}</span>
                    <span style={{fontSize:12,fontWeight:500,color:a.p<0?"#dc2626":"#16a34a"}}>{a.p>0?"+":""}{a.p.toFixed(1)}%</span>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,marginTop:8,borderTop:"2px solid #d1d5db"}}>
                  <span style={{fontSize:14,fontWeight:700}}>Comp-Based Estimate</span>
                  <span style={{fontSize:18,fontWeight:700,color:"#16a34a"}}>${ca.price.toLocaleString()}</span>
                </div>
              </div>
              <h4 style={{fontSize:12,fontWeight:600,color:"#6b7280",marginBottom:8}}>Recent Comps</h4>
              {cityComps.map((c,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:8,background:i%2===0?"#f9fafb":"#fff",borderRadius:6,marginBottom:4,fontSize:12}}>
                  <div>
                    <p style={{fontWeight:500,color:"#111827",margin:0}}>{c.address}</p>
                    <p style={{color:"#9ca3af",margin:0}}>{c.beds}bd/{c.baths}ba - {c.sqft.toLocaleString()} sqft - Sold {c.soldDate}</p>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <p style={{fontWeight:600,color:"#111827",margin:0}}>${c.price.toLocaleString()}</p>
                    <p style={{color:"#9ca3af",margin:0}}>${c.pricePerSqft}/sqft</p>
                  </div>
                </div>
              ))}
            </div>

            <div className="card" style={{padding:24}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#111827",marginTop:0,marginBottom:16}}>Method 2: Multi-Factor Scoring</h3>
              <div style={{background:"#f9fafb",borderRadius:8,padding:16,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#6b7280"}}>Composite Negotiation Score</span>
                  <span style={{fontSize:20,fontWeight:700,color:"#7c3aed"}}>{mf.score}/100</span>
                </div>
                <div className="score-bar"><div className="score-fill" style={{width:mf.score+"%",background:"#7c3aed"}}/></div>
                <p style={{fontSize:11,color:"#9ca3af",margin:"8px 0 0"}}>Higher = more leverage. Discount: {mf.discPct}%</p>
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,marginTop:8,borderTop:"2px solid #d1d5db"}}>
                  <span style={{fontSize:14,fontWeight:700}}>Factor-Based Estimate</span>
                  <span style={{fontSize:18,fontWeight:700,color:"#7c3aed"}}>${mf.price.toLocaleString()}</span>
                </div>
              </div>
              {mf.factors.map((f,i)=>(
                <div key={i} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:12,fontWeight:500,color:"#374151"}}>{f.name}</span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,color:"#9ca3af"}}>wt:{f.weight}</span>
                      <span style={{fontSize:12,fontWeight:700,color:f.score>=70?"#16a34a":f.score>=45?"#ca8a04":"#2563eb"}}>{f.score}</span>
                    </div>
                  </div>
                  <div className="score-bar"><div className="score-fill" style={{width:f.score+"%",background:f.score>=70?"#16a34a":f.score>=45?"#eab308":"#3b82f6"}}/></div>
                  <p style={{fontSize:11,color:"#9ca3af",margin:"2px 0 0"}}>{f.detail}</p>
                </div>
              ))}
            </div>
          </div>

          {/* PROPERTY DATA CARDS */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:24}}>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>FEMA Flood Zone</h4>
              <div style={{textAlign:"center",padding:"12px 0"}}>
                <p style={{fontSize:28,fontWeight:700,color:"#111827",margin:0}}>Zone {l.floodZone}</p>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,margin:"4px 0"}}>
                  {l.floodRisk==="Minimal"?<CheckIcon/>:l.floodRisk==="Moderate"?<WarnIcon/>:<XIcon/>}
                  <span style={{fontWeight:500,color:l.floodRisk==="Minimal"?"#16a34a":l.floodRisk==="Moderate"?"#ca8a04":"#dc2626"}}>{l.floodRisk} Risk</span>
                </div>
                <p style={{fontSize:11,color:"#9ca3af"}}>FEMA Panel: {l.femaPanel}</p>
                {l.floodRisk==="High" && <p style={{fontSize:11,color:"#dc2626",fontWeight:500}}>Flood insurance required (~$2,500-4,500/yr)</p>}
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>Crime Analysis</h4>
              <div style={{textAlign:"center",padding:"12px 0"}}>
                <p style={{fontSize:28,fontWeight:700,color:"#111827",margin:0}}>Grade {l.crimeGrade}</p>
                <p style={{fontSize:13,color:"#6b7280",margin:"4px 0"}}>Crime Index: {l.crimeScore}/100</p>
                <div className="score-bar"><div className="score-fill" style={{width:(100-l.crimeScore)+"%",background:l.crimeScore<35?"#16a34a":l.crimeScore<55?"#eab308":"#dc2626"}}/></div>
                <p style={{fontSize:11,color:"#9ca3af",marginTop:4}}>(Lower index = safer)</p>
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>Building Permits</h4>

                <div>

                  <p style={{fontSize:11,color:"#6b7280",margin:"8px 0 0"}}>Date: ________________________</p>
                  <div style={{marginTop:24,borderBottom:"1px solid #111827",marginBottom:4}}/>
                  <p style={{fontSize:11,color:"#6b7280",margin:0}}>Co-Seller Signature (if applicable)</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Printed Name: ________________________</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Date: ________________________</p>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:(hasBuyerAgent && hasListingAgent)?"1fr 1fr":hasListingAgent||hasBuyerAgent?"1fr":"1fr",gap:40}}>
                {hasBuyerAgent && (
                <div>
                  <p style={{fontWeight:600,color:"#374151",margin:"0 0 30px",fontSize:11}}>BUYER'S AGENT / BROKER:</p>
                  <div style={{borderBottom:"1px solid #9ca3af",marginBottom:4}}/>
                  <p style={{fontSize:10,color:"#6b7280",margin:0}}>Agent Signature</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"4px 0 0"}}>Name: {buyerInfo.agent||"________________________"} | License #: {buyerInfo.agentLicense||"____________"}</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"2px 0 0"}}>Brokerage: {buyerInfo.brokerage||"________________________"} | Date: ________________________</p>

                {hasListingAgent && (
                <div>
                  <p style={{fontWeight:600,color:"#374151",margin:"0 0 30px",fontSize:11}}>SELLER'S AGENT / BROKER:</p>
                  <div style={{borderBottom:"1px solid #9ca3af",marginBottom:4}}/>
                  <p style={{fontSize:10,color:"#6b7280",margin:0}}>Agent Signature</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"4px 0 0"}}>Name: {sellerInfo.agent||"________________________"} | License #: {sellerInfo.agentLicense||"____________"}</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"2px 0 0"}}>Brokerage: {sellerInfo.brokerage||"________________________"} | Date: ________________________</p>

            <div style={{marginTop:24,padding:16,border:"2px solid #fbbf24",background:"#fffbeb",borderRadius:8}}>
              <p style={{fontSize:10,fontWeight:700,color:"#92400e",margin:"0 0 6px"}}>IMPORTANT LEGAL DISCLAIMER</p>
              <p style={{fontSize:9,color:"#78350f",margin:0,lineHeight:1.6}}>
                All property information, market data, pricing analysis, and offer recommendations provided by PropertyAgent Pro are for informational purposes only and must be independently verified by the user. PropertyAgent Pro does not guarantee the accuracy, completeness, or reliability of any data presented. The buyer assumes all responsibility for verifying property records, title status, flood zones, wind zones, permits, tax assessments, and all other information contained in any generated offer or analysis. This tool does not constitute legal, financial, or real estate advice. Users are strongly encouraged to consult with licensed real estate professionals, attorneys, and inspectors before making any purchase decisions or submitting offers. By using this service, you acknowledge and agree that PropertyAgent Pro, its developers, and affiliates bear no liability for any decisions made based on information provided herein.
              </p>
            </div>

            <div style={{textAlign:"center",marginTop:32,paddingTop:16,borderTop:"1px solid #e5e7eb"}}>
              <p style={{fontSize:10,color:"#9ca3af",margin:0,lineHeight:1.6}}>This Residential Sale and Purchase Contract was generated by PropertyAgent Pro. This document is designed to conform to the standards and structure of the Florida Realtors / Florida Bar Residential Contract. However, it has not been reviewed by the Florida Bar or the Florida Association of Realtors. <strong>BOTH BUYER AND SELLER ARE STRONGLY ADVISED TO CONSULT WITH A LICENSED FLORIDA REAL ESTATE ATTORNEY BEFORE EXECUTING THIS CONTRACT.</strong> This document does not constitute legal advice. This Contract is not binding until signed by all parties and delivered.</p>
            </div>
          </div>
    );

    return (
      <div className="gradient-bg min-h-screen">
        {/* EDITOR TOOLBAR */}
        <div className="no-print" style={{background:"#1e293b",color:"#fff",padding:"12px 0",position:"sticky",top:0,zIndex:100}}>
          <div style={{maxWidth:900,margin:"0 auto",padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <button onClick={()=>setStep("analysis")} style={{background:"none",border:"none",color:"#93c5fd",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                <ChevLeft c="#93c5fd"/> Back to Analysis
              </button>
              <span style={{color:"#475569"}}>|</span>
              <span style={{fontSize:13,color:"#94a3b8"}}>Residential Sale & Purchase Contract</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <button onClick={()=>setPreviewMode(false)}
                style={{background:!previewMode?"#3b82f6":"transparent",color:!previewMode?"#fff":"#94a3b8",border:"1px solid "+(!previewMode?"#3b82f6":"#475569"),borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                Edit
              </button>
              <button onClick={()=>setPreviewMode(true)}
                style={{background:previewMode?"#3b82f6":"transparent",color:previewMode?"#fff":"#94a3b8",border:"1px solid "+(previewMode?"#3b82f6":"#475569"),borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                Preview
              </button>
              <button onClick={()=>showToast("Draft saved!")}
                style={{background:"transparent",color:"#94a3b8",border:"1px solid #475569",borderRadius:6,padding:"6px 14px",fontSize:12,fontWeight:600,cursor:"pointer"}}>
                Save Draft
              </button>
              <button onClick={handlePrint}
                style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                <PrintIcon/> Print / Save as PDF
              </button>
            </div>
          </div>
        </div>

        <div style={{maxWidth:900,margin:"0 auto",padding:"24px"}}>

          {/* ═══ PREVIEW MODE ═══ */}
          {previewMode && (
            <>
              <div className="no-print" style={{marginBottom:20}}>
                <PrintableContract />
              </div>
              <div className="no-print" style={{textAlign:"center",marginBottom:24}}>
                <button onClick={()=>setPreviewMode(false)}
                  style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer",marginRight:12}}>
                  Edit Document
                </button>
                <button onClick={handlePrint}
                  style={{background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:8,padding:"10px 24px",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:6}}><PrintIcon s={14}/> Print / Save as PDF</span>
                </button>
                <p style={{fontSize:12,color:"#6b7280",marginTop:8}}>{hasPaid ? "Tip: Choose \"Save as PDF\" in the print dialog to save a digital copy" : "One-time fee of $"+OFFER_FEE+" required to print"}</p>
              </div>
            </>
          )}

          {/* ═══ EDIT MODE ═══ */}
          {!previewMode && (
            <>

          {/* ═══ EDITOR PANEL 0: OFFER PRICE ═══ */}
          <div className="card no-print" style={{padding:24,marginBottom:20,background:"linear-gradient(135deg,#eff6ff,#f0fdf4)",border:"1px solid #93c5fd"}}>
            {sectHead("Your Offer Price","")}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,alignItems:"end"}}>
              <div>
                <label style={lbl}>Offer Amount ($)</label>
                <input type="number" value={manualOfferPrice > 0 ? manualOfferPrice : of.rec}
                  onChange={e=>setManualOfferPrice(+e.target.value)}
                  style={{...fld,fontSize:18,fontWeight:700,padding:"12px 14px",borderColor:"#3b82f6"}}/>
                <p style={{fontSize:11,color:"#6b7280",margin:"6px 0 0"}}>
                  AI Suggested: <strong style={{color:"#2563eb"}}>${of.rec.toLocaleString()}</strong> (Range: ${of.lo.toLocaleString()} — ${of.hi.toLocaleString()})
                </p>
              </div>
              <div>
                <div style={{background:"#fff",borderRadius:8,padding:14,border:"1px solid #e5e7eb"}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                    <span style={{color:"#6b7280"}}>List Price:</span>
                    <span style={{textDecoration:"line-through",color:"#ef4444"}}>${l.price.toLocaleString()}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                    <span style={{color:"#6b7280"}}>Your Offer:</span>
                    <span style={{fontWeight:700,color:"#111827"}}>${offerPrice.toLocaleString()}</span>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}>
                    <span style={{color:"#6b7280"}}>Savings:</span>
                    <span style={{fontWeight:600,color:offerSave>=0?"#16a34a":"#dc2626"}}>${offerSave.toLocaleString()} ({offerSavePct}%)</span>
                  </div>
                </div>
              </div>
            </div>
            {manualOfferPrice > 0 && manualOfferPrice !== of.rec && (
              <div style={{marginTop:12,display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:12,color:"#6b7280"}}>Using your manual offer price.</span>
                <button onClick={()=>setManualOfferPrice(0)} style={{background:"none",border:"none",color:"#2563eb",fontSize:12,cursor:"pointer",textDecoration:"underline"}}>
                  Reset to AI suggestion (${of.rec.toLocaleString()})
                </button>
              </div>
            )}
          </div>

          {/* ═══ EDITOR PANEL 1: BUYER ═══ */}
          <div className="card no-print" style={{padding:24,marginBottom:20}}>
            {sectHead("","Buyer Information")}
            <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:12,marginBottom:16}}>
              <p style={{fontSize:12,color:"#1e40af",margin:0,lineHeight:1.5}}>
                <strong>Save on commission:</strong> This contract is designed so you can submit an offer directly to the seller or listing agent without needing your own buyer's agent. If you do have a buyer's agent, toggle the option below to include their information.
              </p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              {[
                {label:"Buyer Full Legal Name(s)",key:"name",ph:"John A. Smith and Jane B. Smith"},
                {label:"Current Address",key:"address",ph:"123 Current St"},
                {label:"City",key:"city",ph:"Tampa"},
                {label:"State",key:"state",ph:"FL"},
                {label:"ZIP",key:"zip",ph:"33601"},
                {label:"Phone",key:"phone",ph:"(813) 555-0100"},
                {label:"Email",key:"email",ph:"buyer@email.com"},
              ].map(f=>(
                <div key={f.key}>
                  <label style={lbl}>{f.label}</label>
                  <input value={buyerInfo[f.key]} onChange={e=>setBuyerInfo({...buyerInfo,[f.key]:e.target.value})} placeholder={f.ph} style={fld}/>
                </div>
              ))}
            </div>

            {/* Optional Agent Toggle */}
            <div style={{marginTop:20,padding:14,background:hasBuyerAgent?"#f0fdf4":"#f9fafb",borderRadius:8,border:"1px solid "+(hasBuyerAgent?"#bbf7d0":"#e5e7eb")}}>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,fontWeight:600,color:hasBuyerAgent?"#166534":"#6b7280"}}>
                <input type="checkbox" checked={hasBuyerAgent} onChange={e=>setHasBuyerAgent(e.target.checked)} style={{accentColor:"#16a34a"}}/>

              {!hasBuyerAgent && <p style={{fontSize:11,color:"#9ca3af",margin:"6px 0 0 26px"}}>Leave unchecked if you are representing yourself. You may save 2.5-3% in buyer agent commission.</p>}
            </div>
            {hasBuyerAgent && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:14,padding:14,background:"#f9fafb",borderRadius:8}}>
                {[
                  {label:"Agent Name",key:"agent",ph:"Licensed agent name"},
                  {label:"Agent License #",key:"agentLicense",ph:"SL3XXXXXX"},
                  {label:"Agent Phone",key:"agentPhone",ph:"(813) 555-0200"},
                  {label:"Agent Email",key:"agentEmail",ph:"agent@brokerage.com"},
                  {label:"Brokerage Name",key:"brokerage",ph:"ABC Realty, Inc."},
                  {label:"Brokerage License #",key:"brokerageLicense",ph:"CQ10XXXXX"},
                ].map(f=>(
                  <div key={f.key}>
                    <label style={lbl}>{f.label}</label>
                    <input value={buyerInfo[f.key]} onChange={e=>setBuyerInfo({...buyerInfo,[f.key]:e.target.value})} placeholder={f.ph} style={fld}/>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="card no-print" style={{padding:24,marginBottom:20}}>
            {sectHead("","Seller Information")}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
              <div>
                <label style={lbl}>Seller Full Legal Name(s)</label>
                <input value={sellerInfo.name} onChange={e=>setSellerInfo({...sellerInfo,name:e.target.value})} placeholder="Current property owner(s)" style={fld}/>
              </div>
              <div>
                <label style={lbl}>Seller Address</label>
                <input value={sellerInfo.address} onChange={e=>setSellerInfo({...sellerInfo,address:e.target.value})} placeholder="(if known)" style={fld}/>
              </div>
            </div>

            {/* Optional Listing Agent Toggle */}
            <div style={{marginTop:20,padding:14,background:hasListingAgent?"#f0fdf4":"#f9fafb",borderRadius:8,border:"1px solid "+(hasListingAgent?"#bbf7d0":"#e5e7eb")}}>
              <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13,fontWeight:600,color:hasListingAgent?"#166534":"#6b7280"}}>
                <input type="checkbox" checked={hasListingAgent} onChange={e=>setHasListingAgent(e.target.checked)} style={{accentColor:"#16a34a"}}/>
                Property has a Listing Agent
              </label>
              {!hasListingAgent && <p style={{fontSize:11,color:"#9ca3af",margin:"6px 0 0 26px"}}>Uncheck if the seller is self-represented (FSBO).</p>}
            </div>
            {hasListingAgent && (
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginTop:14,padding:14,background:"#f9fafb",borderRadius:8}}>
                {[
                  {label:"Listing Agent Name",key:"agent",ph:"Listing agent name"},
                  {label:"Listing Agent License #",key:"agentLicense",ph:"SL3XXXXXX"},
                  {label:"Listing Agent Phone",key:"agentPhone",ph:"(813) 555-0300"},
                  {label:"Listing Brokerage",key:"brokerage",ph:"XYZ Realty, LLC"},
                ].map(f=>(
                  <div key={f.key}>
                    <label style={lbl}>{f.label}</label>
                    <input value={sellerInfo[f.key]} onChange={e=>setSellerInfo({...sellerInfo,[f.key]:e.target.value})} placeholder={f.ph} style={fld}/>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* ═══ EDITOR PANEL 2: PROPERTY & LEGAL ═══ */}
          <div className="card no-print" style={{padding:24,marginBottom:20}}>
            {sectHead("","Property & Legal Description")}

              <div><label style={lbl}>County</label><input value={countyName} onChange={e=>setCountyName(e.target.value)} placeholder="Hillsborough" style={fld}/></div>
              <div>
                <label style={lbl}>Tax Parcel ID / Folio # <Tip id="taxParcelId" text={TIPS.taxParcelId}/></label>

                    setLookupParcel(true);
                    setTimeout(()=>{
                      setLookupParcel(false);
                      if(sel && sel.parcelId) setTaxParcelId(sel.parcelId);

                    {lookupParcel ? <span className="lookup-spinner"/> : "Lookup"}
                  </button>
                </div>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <label style={lbl}>Legal Description <Tip id="legalDescription" text={TIPS.legalDescription}/></label>
              <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
                <textarea value={legalDescription} onChange={e=>setLegalDescription(e.target.value)} placeholder="Lot 12, Block 3, SUNSET PARK SUBDIVISION, as recorded in Plat Book 45, Page 78, of the Public Records of Hillsborough County, Florida."

                <button onClick={()=>{
                  setLookupLegal(true);
                  setTimeout(()=>{
                    setLookupLegal(false);
                    if(sel && sel.legalDesc) setLegalDescription(sel.legalDesc);
                  },1200);
                }} style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 12px",fontSize:12,fontWeight:600,color:"#2563eb",cursor:"pointer",whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4,marginTop:0}}>
                  {lookupLegal ? <span className="lookup-spinner"/> : "Lookup"}
                </button>
              </div>
            </div>
          </div>

          {/* ═══ EDITOR PANEL 3: FINANCIAL TERMS ═══ */}
          <div className="card no-print" style={{padding:24,marginBottom:20}}>
            {sectHead("","Financial Terms")}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14}}>
              <div><label style={lbl}>Earnest Money Deposit ($) <Tip id="earnestMoney" text={TIPS.earnestMoney}/></label><input type="number" value={earnestMoney} onChange={e=>setEarnestMoney(+e.target.value)} style={fld}/></div>
              <div><label style={lbl}>Additional Deposit ($) <Tip id="additionalDeposit" text={TIPS.additionalDeposit}/></label><input type="number" value={additionalDeposit} onChange={e=>setAdditionalDeposit(+e.target.value)} style={fld}/></div>
              <div><label style={lbl}>Deposit Deadline (days) <Tip id="depositDeadline" text={TIPS.depositDeadline}/></label><input type="number" value={depositDeadline} onChange={e=>setDepositDeadline(+e.target.value)} style={fld}/></div>
              <div><label style={lbl}>Escrow / Title Agent <Tip id="escrowAgent" text={TIPS.escrowAgent}/></label><input value={escrowAgent} onChange={e=>setEscrowAgent(e.target.value)} placeholder="Title company name" style={fld}/></div>
              <div><label style={lbl}>Financing Type <Tip id="financingType" text={TIPS.financingType}/></label>
                <select value={financingType} onChange={e=>setFinancingType(e.target.value)} style={fld}>
                  <option>Conventional</option><option>FHA</option><option>VA</option><option>USDA</option><option>Cash (No Financing)</option><option>Seller Financing</option><option>Assumption</option>
                </select>
              </div>
              <div><label style={lbl}>Loan Term (years) <Tip id="loanTerm" text={TIPS.loanTerm}/></label><input type="number" value={loanTerm} onChange={e=>setLoanTerm(+e.target.value)} style={fld}/></div>
              <div><label style={lbl}>Interest Rate Cap (%) <Tip id="interestRateCap" text={TIPS.interestRateCap}/></label><input type="number" step="0.125" value={interestRateCap} onChange={e=>setInterestRateCap(+e.target.value)} style={fld}/></div>
              <div><label style={lbl}>Seller Concessions ($) <Tip id="sellerConcessions" text={TIPS.sellerConcessions}/></label><input type="number" value={sellerConcessions} onChange={e=>setSellerConcessions(+e.target.value)} style={fld}/></div>
              <div style={{display:"flex",alignItems:"end",gap:8,paddingBottom:4}}>
                <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                  <input type="checkbox" checked={preApproval} onChange={e=>setPreApproval(e.target.checked)} style={{accentColor:"#2563eb"}}/>Pre-Approval Letter <Tip id="preApproval" text={TIPS.preApproval}/>

              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:14,marginTop:14}}>
              <div><label style={lbl}>Closing Period (days) <Tip id="closingDays" text={TIPS.closingDays}/></label><input type="number" value={closingDays} onChange={e=>setClosingDays(+e.target.value)} style={fld}/></div>

            </div>
          </div>

            {sectHead("","Title, Deed & Closing")}

                <select value={titlePaidBy} onChange={e=>setTitlePaidBy(e.target.value)} style={fld}><option>Buyer</option><option>Seller</option><option>Split 50/50</option></select>
              </div>
              <div><label style={lbl}>Deed Type <Tip id="deedType" text={TIPS.deedType}/></label>

              </div>
              <div><label style={lbl}>Dispute Resolution <Tip id="disputeResolution" text={TIPS.disputeResolution}/></label>
                <select value={disputeResolution} onChange={e=>setDisputeResolution(e.target.value)} style={fld}><option>Mediation then Litigation</option><option>Mediation then Arbitration</option><option>Litigation Only</option></select>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:8,justifyContent:"center"}}>
                <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                  <input type="checkbox" checked={surveyRequired} onChange={e=>setSurveyRequired(e.target.checked)} style={{accentColor:"#2563eb"}}/>Survey Required <Tip id="surveyRequired" text={TIPS.surveyRequired}/>
                </label>
                <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                  <input type="checkbox" checked={walkthrough} onChange={e=>setWalkthrough(e.target.checked)} style={{accentColor:"#2563eb"}}/>Pre-Closing Walk-Through <Tip id="walkthrough" text={TIPS.walkthrough}/>
                </label>
                <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                  <input type="checkbox" checked={assignable} onChange={e=>setAssignable(e.target.checked)} style={{accentColor:"#2563eb"}}/>Contract Assignable <Tip id="assignable" text={TIPS.assignable}/>
                </label>
              </div>
            </div>
          </div>

          {/* ═══ EDITOR PANEL 5: PERSONAL PROPERTY & WARRANTY ═══ */}
          <div className="card no-print" style={{padding:24,marginBottom:20}}>
            {sectHead("","Personal Property & Home Warranty")}
            <div>
              <label style={lbl}>Personal Property Included with Sale <Tip id="personalProperty" text={TIPS.personalProperty}/></label>
              <textarea value={personalPropertyIncluded} onChange={e=>setPersonalPropertyIncluded(e.target.value)}
                style={{...fld,minHeight:50,resize:"vertical"}}/>
            </div>
            <div style={{marginTop:14}}>
              <label style={lbl}>Items Excluded from Sale</label>
              <textarea value={personalPropertyExcluded} onChange={e=>setPersonalPropertyExcluded(e.target.value)} placeholder="e.g. Dining room chandelier, detached storage shed contents"
                style={{...fld,minHeight:40,resize:"vertical"}}/>
            </div>
            <div style={{display:"flex",gap:16,alignItems:"center",marginTop:14}}>
              <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                <input type="checkbox" checked={homeWarranty} onChange={e=>setHomeWarranty(e.target.checked)} style={{accentColor:"#2563eb"}}/>Home Warranty <Tip id="homeWarranty" text={TIPS.homeWarranty}/>
              </label>
              {homeWarranty && <>
                <div><label style={{...lbl,marginBottom:0,fontSize:11}}>Paid By</label>
                  <select value={homeWarrantyPaidBy} onChange={e=>setHomeWarrantyPaidBy(e.target.value)} style={{...fld,width:120,padding:"4px 8px"}}>
                    <option>Seller</option><option>Buyer</option>
                  </select>
                </div>
                <div><label style={{...lbl,marginBottom:0,fontSize:11}}>Amount ($)</label>
                  <input type="number" value={homeWarrantyAmount} onChange={e=>setHomeWarrantyAmount(+e.target.value)} style={{...fld,width:80,padding:"4px 8px"}}/>
                </div>
              </>}
            </div>
          </div>

          {/* ═══ EDITOR PANEL 6: CONTINGENCIES ═══ */}
          <div className="card no-print" style={{padding:24,marginBottom:20}}>
            {sectHead("","Contingencies")}
            <p style={{fontSize:12,color:"#6b7280",margin:"-8px 0 16px"}}>Toggle on/off and adjust timeframes. Enabled items appear in the printed contract.</p>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {contingencies.map((c,i)=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:c.enabled?"#f0fdf4":"#f9fafb",borderRadius:8,border:"1px solid "+(c.enabled?"#bbf7d0":"#e5e7eb")}}>
                  <input type="checkbox" checked={c.enabled} onChange={e=>{
                    const nc=[...contingencies]; nc[i]={...nc[i],enabled:e.target.checked}; setContingencies(nc);
                  }} style={{accentColor:"#16a34a",flexShrink:0}}/>
                  <span style={{fontSize:13,fontWeight:600,color:c.enabled?"#166534":"#6b7280",flex:1}}>{c.label}</span>
                  <div style={{display:"flex",alignItems:"center",gap:4}}>
                    <input type="number" value={c.days} onChange={e=>{
                      const nc=[...contingencies]; nc[i]={...nc[i],days:+e.target.value}; setContingencies(nc);
                    }} style={{width:50,border:bl,borderRadius:6,padding:"4px 8px",fontSize:12,textAlign:"center"}}/>
                    <span style={{fontSize:11,color:"#9ca3af"}}>days</span>
                  </div>
                </div>
              ))}
            </div>
            <h4 style={{fontSize:12,fontWeight:600,color:"#374151",marginTop:16,marginBottom:8}}>Add Custom Contingency</h4>
            {customContingencies.map((cc,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
                <textarea value={cc} onChange={e=>{const nc=[...customContingencies];nc[i]=e.target.value;setCustomContingencies(nc);}}
                  style={{flex:1,border:bl,borderRadius:8,padding:"8px 12px",fontSize:12,minHeight:50,resize:"vertical"}}/>
                <button onClick={()=>setCustomContingencies(customContingencies.filter((_,j)=>j!==i))}
                  style={{background:"#fee2e2",color:"#dc2626",border:"none",borderRadius:6,padding:"6px 10px",fontSize:12,cursor:"pointer",fontWeight:600}}>Remove</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8}}>
              <input value={newCustom} onChange={e=>setNewCustom(e.target.value)} placeholder="Type a custom contingency..."
                style={{flex:1,border:bl,borderRadius:8,padding:"8px 12px",fontSize:13,boxSizing:"border-box"}}/>
              <button onClick={()=>{if(newCustom.trim()){setCustomContingencies([...customContingencies,newCustom.trim()]);setNewCustom("");}}}
                style={{background:"#2563eb",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>+ Add</button>
            </div>
          </div>

          {/* ═══ EDITOR PANEL 7: ADDITIONAL TERMS ═══ */}
          <div className="card no-print" style={{padding:24,marginBottom:20}}>
            {sectHead("","Additional Terms & Special Provisions")}
            <textarea value={additionalTerms} onChange={e=>setAdditionalTerms(e.target.value)} placeholder="Seller concessions toward closing costs, repair credits, specific move-out dates, appliance warranties, or any other special provisions..."
              style={{...fld,minHeight:80,resize:"vertical"}}/>
          </div>

          {/* Preview Document button at the bottom of editor */}
          <div className="no-print" style={{textAlign:"center",marginBottom:24}}>
            <button onClick={()=>setPreviewMode(true)}
              style={{background:"linear-gradient(135deg,#2563eb,#1e40af)",color:"#fff",border:"none",borderRadius:10,padding:"14px 48px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(37,99,235,0.3)"}}>
              Preview Document
            </button>
          </div>

            </>
          )}

          {/* ═══════════════════════════════════════════════════════════════════
             PRINTABLE CONTRACT — ALWAYS IN DOM FOR PRINT (hidden on screen)
             ═══════════════════════════════════════════════════════════════════ */}
          <div className="print-only">
            <PrintableContract />
          </div>

        </div>
        <PayModal/>
        <Toast/>
      </div>
    );
  }

  return null;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
