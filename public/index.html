function compBased(listing, comps) {
  const avgPSF = comps.reduce((s,c)=>s+c.pricePerSqft,0)/comps.length;
  let base = avgPSF * listing.sqft;
  const adj = [];
  const age = 2026-listing.yearBuilt;
  if(age>30){base*=0.96;adj.push({l:"Age >30 yrs",p:-4});}
  else if(age>15){base*=0.98;adj.push({l:"Age 15-30 yrs",p:-2});}
  if(listing.daysOnMarket>90){base*=0.95;adj.push({l:"On market >90 days (stale)",p:-5});}
  else if(listing.daysOnMarket>60){base*=0.97;adj.push({l:"On market >60 days",p:-3});}
  else if(listing.daysOnMarket>30){base*=0.99;adj.push({l:"On market >30 days",p:-1});}
  if(listing.priceReductions.length>=3){base*=0.97;adj.push({l:"3+ price cuts (motivated)",p:-3});}
  else if(listing.priceReductions.length>=1){base*=0.99;adj.push({l:"Price reduced",p:-1});}
  if(listing.floodRisk==="High"){base*=0.93;adj.push({l:"High flood risk zone",p:-7});}
  else if(listing.floodRisk==="Moderate"){base*=0.97;adj.push({l:"Moderate flood risk",p:-3});}
  if(listing.foreclosure){base*=0.90;adj.push({l:"Foreclosure / bank-owned",p:-10});}
  if(listing.lisPendens){base*=0.97;adj.push({l:"Lis pendens filed",p:-3});}
  if(listing.permits.open>0){base*=(1-listing.permits.open*0.015);adj.push({l:listing.permits.open+" open permit(s)",p:-(listing.permits.open*1.5)});}
  base*=MARKET.listToSaleRatio;
  adj.push({l:"Market list-to-sale ratio ("+((MARKET.listToSaleRatio*100).toFixed(1))+"%)",p:-((1-MARKET.listToSaleRatio)*100)});
  return {price:Math.round(base),avgPSF:avgPSF.toFixed(2),baseRaw:Math.round(avgPSF*listing.sqft),adj};
}

function multiFactor(listing) {
  const f=[];let ts=0,tw=0;
  const add=(name,score,weight,detail)=>{f.push({name,score,weight,detail});ts+=score*weight;tw+=weight;};
  const ptr=listing.price/listing.taxAssessed;
  add("Price vs Tax Assessed",ptr>1.2?30:ptr>1.1?50:ptr>1.0?70:90,15,
    "Listed "+((ptr-1)*100).toFixed(1)+"% "+(ptr>=1?"above":"below")+" assessed ($"+listing.taxAssessed.toLocaleString()+")");
  add("Days on Market",listing.daysOnMarket<14?40:listing.daysOnMarket<30?55:listing.daysOnMarket<60?70:listing.daysOnMarket<90?80:95,12,
    listing.daysOnMarket+" days (area avg: "+MARKET.avgDaysOnMarket+")");
  const tr=listing.originalPrice-listing.price;
  add("Price Reduction History",listing.priceReductions.length===0?40:listing.priceReductions.length===1?60:listing.priceReductions.length===2?75:90,10,
    listing.priceReductions.length+" cut(s), $"+tr.toLocaleString()+" off ("+((tr/listing.originalPrice)*100).toFixed(1)+"%)");
  add("Flood Zone Risk",listing.floodRisk==="Minimal"?30:listing.floodRisk==="Moderate"?60:90,12,
    "Zone "+listing.floodZone+" — "+listing.floodRisk+" (FEMA: "+listing.femaPanel+")");
  add("Crime Index",listing.crimeScore<25?30:listing.crimeScore<40?45:listing.crimeScore<55?60:listing.crimeScore<70?75:90,10,
    "Score "+listing.crimeScore+"/100 — Grade "+listing.crimeGrade);
  add("Open Permits",listing.permits.open===0?20:listing.permits.open===1?55:listing.permits.open===2?75:95,8,
    listing.permits.open+" open, "+listing.permits.closed+" closed");
  add("Foreclosure / Lis Pendens",(!listing.foreclosure&&!listing.lisPendens)?20:(listing.lisPendens&&!listing.foreclosure)?65:listing.foreclosure?90:50,10,
    "Foreclosure: "+(listing.foreclosure?"Yes":"No")+" | Lis Pendens: "+(listing.lisPendens?"Yes":"No"));
  let apS=50;
  if(listing.previousSales.length>0){
    const ls=listing.previousSales[0];const ya=2026-parseInt(ls.date.split("-")[0]);
    const aa=ya>0?((listing.price/ls.price)**(1/ya)-1)*100:0;
    apS=aa>8?85:aa>5?65:aa>3?50:35;
    add("Annual Appreciation",apS,8,aa.toFixed(1)+"%/yr since $"+ls.price.toLocaleString()+" in "+ls.date.split("-")[0]);
  } else { add("Annual Appreciation",50,8,"No previous sale data"); }
  add("Market Conditions",MARKET.monthlyInventory>5?85:MARKET.monthlyInventory>3?65:MARKET.monthlyInventory>2?45:30,8,
    MARKET.monthlyInventory+" mo inventory, "+(MARKET.priceChangeYoY>0?"+":"")+MARKET.priceChangeYoY+"% YoY");
  add("Listing History",listing.previousListings===0?30:listing.previousListings===1?50:listing.previousListings===2?70:90,7,
    "Listed "+(listing.previousListings+1)+" time(s) total");
  const cs=ts/tw;
  const dp=Math.max(0,Math.min(18,(cs-20)*0.257));
  return {score:cs.toFixed(1),discPct:dp.toFixed(1),price:Math.round(listing.price*(1-dp/100)),factors:f};
}

function reconcile(cp,fp,listing){
  const avg=Math.round((cp+fp)/2),lo=Math.min(cp,fp),hi=Math.max(cp,fp),sp=hi-lo;
  const conf=sp<listing.price*0.03?"High":sp<listing.price*0.06?"Moderate":"Low";
  return {rec:avg,lo,hi,sp,conf,save:listing.price-avg,savePct:((listing.price-avg)/listing.price*100).toFixed(1)};
}

                  <p className="line-clamp-1" style={{fontSize:12,color:"#9ca3af",marginTop:8}}>{l.description}</p>
                </div>
                <div style={{textAlign:"right",marginLeft:24,flexShrink:0}}>
                  <p style={{fontSize:20,fontWeight:700,color:"#111827",margin:0}}>${l.price.toLocaleString()}</p>

                  <p style={{fontSize:12,color:"#2563eb",fontWeight:500,marginTop:6}}>Full Analysis →</p>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );

  // ─── SCREEN 3: ANALYSIS ────────────────────────────────────────────
  if (step==="analysis" && sel) {
    const l=sel;
    const ca=compBased(l,COMPARABLES);
    const mf=multiFactor(l);
    const of=reconcile(ca.price,mf.price,l);
    const loan=of.rec-form.downPayment;
    const mr=0.0685/12, np=360;
    const mp=loan*(mr*Math.pow(1+mr,np))/(Math.pow(1+mr,np)-1);
    const mt=l.annualTax/12;
    const mi=l.floodRisk==="High"?380:l.floodRisk==="Moderate"?220:150;
    const tot=mp+mt+mi+l.hoa;

    return (

        <header className="no-print" style={{background:"#fff",borderBottom:"1px solid #e5e7eb",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
          <div style={{maxWidth:1100,margin:"0 auto",padding:"16px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{background:"#2563eb",borderRadius:10,padding:8,display:"flex"}}><HomeIcon/></div>
              <div><h1 style={{fontSize:20,fontWeight:700,margin:0,color:"#111827"}}>{l.address}</h1>
              <p style={{fontSize:13,color:"#6b7280",margin:0}}>{l.city}, {l.state} {l.zip}</p></div>
            </div>
            <div style={{display:"flex",gap:12}}>
              <button onClick={()=>setStep("results")} style={{background:"none",border:"none",color:"#2563eb",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>
                <ChevLeft/> Back to Results
              </button>
              <button onClick={()=>{
                handleGenerateOffer(l);
              }}
                style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                📄 Generate Offer Letter
              </button>
            </div>
          </div>
        </header>

        <div style={{maxWidth:1100,margin:"0 auto",padding:"24px",display:"flex",flexDirection:"column",gap:24}}>

          {/* HERO: SUGGESTED OFFER */}
          <div className="card" style={{overflow:"hidden"}}>
            <div className="gradient-hero" style={{padding:"24px 32px",color:"#fff"}}>
              <p style={{fontSize:12,fontWeight:500,opacity:0.7,margin:"0 0 4px",letterSpacing:1}}>🎯 AI-POWERED SUGGESTED OFFER</p>
              <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:16}}>
                <div>
                  <p style={{fontSize:38,fontWeight:700,margin:0}}>${of.rec.toLocaleString()}</p>
                  <p style={{fontSize:13,opacity:0.7,margin:"4px 0 0"}}>List: ${l.price.toLocaleString()} — Save ${of.save.toLocaleString()} ({of.savePct}%)</p>

                <div style={{display:"flex",gap:32,textAlign:"right"}}>
                  <div><p style={{fontSize:11,opacity:0.5,margin:0}}>Low Estimate</p><p style={{fontSize:18,fontWeight:600,margin:0}}>${of.lo.toLocaleString()}</p></div>
                  <div><p style={{fontSize:11,opacity:0.5,margin:0}}>High Estimate</p><p style={{fontSize:18,fontWeight:600,margin:0}}>${of.hi.toLocaleString()}</p></div>
                  <div><p style={{fontSize:11,opacity:0.5,margin:0}}>Confidence</p>
                    <p style={{fontSize:18,fontWeight:600,margin:0,color:of.conf==="High"?"#86efac":of.conf==="Moderate"?"#fde68a":"#fca5a5"}}>{of.conf}</p></div>
                </div>
              </div>
            </div>
            <div style={{padding:"16px 32px",background:"#eff6ff",borderTop:"1px solid #bfdbfe",display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:16,textAlign:"center"}}>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Down Payment</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${form.downPayment.toLocaleString()}</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Loan Amount</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${loan.toLocaleString()}</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Monthly P&I</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${Math.round(mp).toLocaleString()}</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Tax+Ins+HOA</p><p style={{fontSize:14,fontWeight:600,margin:"2px 0 0"}}>${Math.round(mt+mi+l.hoa).toLocaleString()}/mo</p></div>
              <div><p style={{fontSize:11,color:"#6b7280",margin:0}}>Total Monthly</p><p style={{fontSize:16,fontWeight:700,color:"#1e40af",margin:"2px 0 0"}}>${Math.round(tot).toLocaleString()}/mo</p></div>
            </div>
          </div>

          {/* TWO METHODS */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
            <div className="card" style={{padding:24}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#111827",marginTop:0,marginBottom:16}}>📊 Method 1: Comparable Sales</h3>
              <div style={{background:"#f9fafb",borderRadius:8,padding:16,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#6b7280"}}>Base (avg comp $/sqft x sqft)</span>
                  <span style={{fontSize:14,fontWeight:600}}>${ca.baseRaw.toLocaleString()}</span>
                </div>
                <p style={{fontSize:11,color:"#9ca3af",margin:"0 0 12px"}}>Avg comp: ${ca.avgPSF}/sqft x {l.sqft.toLocaleString()} sqft</p>
                {ca.adj.map((a,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderTop:"1px solid #e5e7eb"}}>
                    <span style={{fontSize:12,color:"#4b5563"}}>{a.l}</span>
                    <span style={{fontSize:12,fontWeight:500,color:a.p<0?"#dc2626":"#16a34a"}}>{a.p>0?"+":""}{a.p.toFixed(1)}%</span>
                  </div>

                <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,marginTop:8,borderTop:"2px solid #d1d5db"}}>
                  <span style={{fontSize:14,fontWeight:700}}>Comp-Based Estimate</span>
                  <span style={{fontSize:18,fontWeight:700,color:"#16a34a"}}>${ca.price.toLocaleString()}</span>
                </div>
              </div>
              <h4 style={{fontSize:12,fontWeight:600,color:"#6b7280",marginBottom:8}}>Recent Comps</h4>
              {COMPARABLES.map((c,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:8,background:i%2===0?"#f9fafb":"#fff",borderRadius:6,marginBottom:4,fontSize:12}}>

            <div className="card" style={{padding:24}}>
              <h3 style={{fontSize:14,fontWeight:700,color:"#111827",marginTop:0,marginBottom:16}}>🧮 Method 2: Multi-Factor Scoring</h3>
              <div style={{background:"#f9fafb",borderRadius:8,padding:16,marginBottom:16}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                  <span style={{fontSize:12,color:"#6b7280"}}>Composite Negotiation Score</span>
                  <span style={{fontSize:20,fontWeight:700,color:"#7c3aed"}}>{mf.score}/100</span>
                </div>
                <div className="score-bar"><div className="score-fill" style={{width:mf.score+"%",background:"#7c3aed"}}/></div>
                <p style={{fontSize:11,color:"#9ca3af",margin:"8px 0 0"}}>Higher = more leverage. Discount: {mf.discPct}%</p>
                <div style={{display:"flex",justifyContent:"space-between",paddingTop:12,marginTop:8,borderTop:"2px solid #d1d5db"}}>
                  <span style={{fontSize:14,fontWeight:700}}>Factor-Based Estimate</span>
                  <span style={{fontSize:18,fontWeight:700,color:"#7c3aed"}}>${mf.price.toLocaleString()}</span>
                </div>
              </div>
              {mf.factors.map((f,i)=>(
                <div key={i} style={{marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontSize:12,fontWeight:500,color:"#374151"}}>{f.name}</span>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <span style={{fontSize:11,color:"#9ca3af"}}>wt:{f.weight}</span>
                      <span style={{fontSize:12,fontWeight:700,color:f.score>=70?"#16a34a":f.score>=45?"#ca8a04":"#2563eb"}}>{f.score}</span>
                    </div>
                  </div>
                  <div className="score-bar"><div className="score-fill" style={{width:f.score+"%",background:f.score>=70?"#16a34a":f.score>=45?"#eab308":"#3b82f6"}}/></div>
                  <p style={{fontSize:11,color:"#9ca3af",margin:"2px 0 0"}}>{f.detail}</p>
                </div>
              ))}
            </div>
          </div>

          {/* PROPERTY DATA CARDS */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:24}}>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>💧 FEMA Flood Zone</h4>
              <div style={{textAlign:"center",padding:"12px 0"}}>
                <p style={{fontSize:28,fontWeight:700,color:"#111827",margin:0}}>Zone {l.floodZone}</p>
                <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,margin:"4px 0"}}>
                  {l.floodRisk==="Minimal"?<CheckIcon/>:l.floodRisk==="Moderate"?<WarnIcon/>:<XIcon/>}
                  <span style={{fontWeight:500,color:l.floodRisk==="Minimal"?"#16a34a":l.floodRisk==="Moderate"?"#ca8a04":"#dc2626"}}>{l.floodRisk} Risk</span>
                </div>
                <p style={{fontSize:11,color:"#9ca3af"}}>FEMA Panel: {l.femaPanel}</p>
                {l.floodRisk==="High" && <p style={{fontSize:11,color:"#dc2626",fontWeight:500}}>Flood insurance required (~$2,500-4,500/yr)</p>}
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>🛡️ Crime Analysis</h4>
              <div style={{textAlign:"center",padding:"12px 0"}}>
                <p style={{fontSize:28,fontWeight:700,color:"#111827",margin:0}}>Grade {l.crimeGrade}</p>
                <p style={{fontSize:13,color:"#6b7280",margin:"4px 0"}}>Crime Index: {l.crimeScore}/100</p>
                <div className="score-bar"><div className="score-fill" style={{width:(100-l.crimeScore)+"%",background:l.crimeScore<35?"#16a34a":l.crimeScore<55?"#eab308":"#dc2626"}}/></div>
                <p style={{fontSize:11,color:"#9ca3af",marginTop:4}}>(Lower index = safer)</p>
              </div>
            </div>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>📋 Building Permits</h4>
              <div style={{textAlign:"center",padding:"12px 0"}}>
                <div style={{display:"flex",justifyContent:"center",gap:32,marginBottom:8}}>
                  <div><p style={{fontSize:28,fontWeight:700,color:l.permits.open>0?"#dc2626":"#16a34a",margin:0}}>{l.permits.open}</p><p style={{fontSize:11,color:"#6b7280",margin:0}}>Open</p></div>
                  <div><p style={{fontSize:28,fontWeight:700,color:"#111827",margin:0}}>{l.permits.closed}</p><p style={{fontSize:11,color:"#6b7280",margin:0}}>Closed</p></div>
                </div>
                {l.permits.lastPermit && <p style={{fontSize:11,color:"#9ca3af"}}>Last: {l.permits.lastPermit.type} ({l.permits.lastPermit.date})</p>}
                {l.permits.open>0 && <p style={{fontSize:11,color:"#dc2626",fontWeight:500}}>Open permits may indicate unfinished work</p>}
              </div>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>🏛️ County Property Records</h4>
              {[
                {l:"Tax Assessed Value",v:"$"+l.taxAssessed.toLocaleString()+" ("+l.taxYear+")"},
                {l:"Annual Property Tax",v:"$"+l.annualTax.toLocaleString()},
                {l:"List vs Assessed",v:((l.price>l.taxAssessed?"+":"")+((l.price/l.taxAssessed-1)*100).toFixed(1)+"%"),c:l.price>l.taxAssessed?"#dc2626":"#16a34a"},
                {l:"Year Built",v:l.yearBuilt},
                {l:"Lot Size",v:l.lotSize>0?l.lotSize+" acres":"N/A (Condo)"},
                {l:"Foreclosure",v:l.foreclosure?"Yes — Bank Owned":"None",c:l.foreclosure?"#dc2626":"#16a34a"},
                {l:"Lis Pendens",v:l.lisPendens?"Filed":"None",c:l.lisPendens?"#dc2626":"#16a34a"},
              ].map((r,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:i<6?"1px solid #f3f4f6":"none",fontSize:13}}>
                  <span style={{color:"#6b7280"}}>{r.l}</span>
                  <span style={{fontWeight:500,color:r.c||"#111827"}}>{r.v}</span>
                </div>
              ))}
            </div>
            <div className="card" style={{padding:20}}>
              <h4 style={{fontSize:13,fontWeight:700,color:"#111827",marginTop:0}}>📈 Sale History & Timeline</h4>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:8,background:"#eff6ff",borderRadius:8,marginBottom:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:"#3b82f6",flexShrink:0}}/>
                <div><p style={{fontSize:12,fontWeight:500,color:"#111827",margin:0}}>Current: ${l.price.toLocaleString()}</p>
                <p style={{fontSize:11,color:"#9ca3af",margin:0}}>Listed {l.listDate} - {l.daysOnMarket} days - {l.previousListings>0?"Listed "+(l.previousListings+1)+"x total":"First listing"}</p></div>
              </div>
              {l.priceReductions.map((pr,i)=>(
                <div key={"pr"+i} style={{display:"flex",alignItems:"center",gap:8,padding:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#f87171",flexShrink:0}}/>
                  <div><p style={{fontSize:12,color:"#4b5563",margin:0}}>Reduced: ${pr.from.toLocaleString()} to ${pr.to.toLocaleString()}</p>
                  <p style={{fontSize:11,color:"#9ca3af",margin:0}}>{pr.date}</p></div>
                </div>
              ))}
              {l.previousSales.map((s,i)=>(
                <div key={"s"+i} style={{display:"flex",alignItems:"center",gap:8,padding:8}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:"#4ade80",flexShrink:0}}/>
                  <div><p style={{fontSize:12,color:"#4b5563",margin:0}}>Sold: ${s.price.toLocaleString()}</p>
                  <p style={{fontSize:11,color:"#9ca3af",margin:0}}>{s.date}</p></div>
                </div>
              ))}
            </div>
          </div>

          {/* WHY THIS PRICE */}
          <div className="card" style={{padding:24}}>
            <h3 style={{fontSize:14,fontWeight:700,color:"#111827",marginTop:0,marginBottom:16}}>ℹ️ Why This Offer Price — Supporting Analysis</h3>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24}}>
              <div>
                <h4 style={{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",marginBottom:8}}>Factors Favoring Lower Offer</h4>
                {[
                  l.daysOnMarket>30 && l.daysOnMarket+" days on market (avg: "+MARKET.avgDaysOnMarket+") — reduced competition",
                  l.priceReductions.length>0 && l.priceReductions.length+" price cut(s), $"+(l.originalPrice-l.price).toLocaleString()+" total — seller willing to negotiate",
                  l.floodRisk!=="Minimal" && "FEMA Zone "+l.floodZone+" ("+l.floodRisk+") — adds insurance cost, limits buyer pool",
                  l.foreclosure && "Bank-owned foreclosure — priced to sell, as-is condition",
                  l.lisPendens && "Lis pendens filed — legal/financial distress = strong leverage",
                  l.permits.open>0 && l.permits.open+" open permit(s) — may require costs or complicate financing",
                  l.crimeScore>50 && "Crime index "+l.crimeScore+" (Grade "+l.crimeGrade+") above metro average",
                  MARKET.priceChangeYoY<0 && "Area prices declining "+MARKET.priceChangeYoY+"% YoY — buyer's market",
                  l.previousListings>=2 && "Listed "+(l.previousListings+1)+" times — repeated market rejection",
                ].filter(Boolean).map((t,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:8}}>
                    <span style={{flexShrink:0,marginTop:2}}><DownIcon/></span>
                    <span style={{fontSize:13,color:"#374151"}}>{t}</span>
                  </div>
                ))}
              </div>
              <div>
                <h4 style={{fontSize:11,fontWeight:600,color:"#6b7280",textTransform:"uppercase",marginBottom:8}}>Factors Supporting List Price</h4>
                {[
                  l.daysOnMarket<21 && "New listing ("+l.daysOnMarket+" days) — seller hasn't tested market yet",
                  l.nearestSchoolRating>=7 && "Near well-rated school ("+l.nearestSchoolRating+"/10) — premium location",
                  l.floodRisk==="Minimal" && "Minimal flood risk (Zone X) — no flood insurance required",
                  l.crimeScore<35 && "Low crime area (Grade "+l.crimeGrade+") supports values",
                  l.permits.open===0 && "No open permits — all work properly closed",
                  !l.foreclosure&&!l.lisPendens && "Clean title — no foreclosure or lis pendens",
                  l.features.length>3 && "Features: "+l.features.join(", "),
                ].filter(Boolean).map((t,i)=>(
                  <div key={i} style={{display:"flex",alignItems:"flex-start",gap:6,marginBottom:8}}>

                <strong style={{color:"#1e40af"}}>Reconciled Recommendation:</strong> Comp-based: <strong>${ca.price.toLocaleString()}</strong>. Multi-factor: <strong>${mf.price.toLocaleString()}</strong> (spread: ${of.sp.toLocaleString()}). Final: <strong style={{color:"#1e40af"}}>${of.rec.toLocaleString()}</strong> — {of.savePct}% below list.
                Confidence: <strong style={{color:of.conf==="High"?"#16a34a":of.conf==="Moderate"?"#ca8a04":"#dc2626"}}>{of.conf}</strong>.
                {of.conf==="High"?" Both models closely agree.":""}
                {of.conf==="Moderate"?" Some divergence — consider starting at the lower estimate.":""}
                {of.conf==="Low"?" Significant divergence — recommend further due diligence.":""}
              </p>
            </div>
          </div>

          {/* GENERATE OFFER BUTTON */}
          <div className="no-print" style={{textAlign:"center"}}>
            <button onClick={()=>handleGenerateOffer(l)}
              style={{background:"linear-gradient(135deg,#16a34a,#15803d)",color:"#fff",border:"none",borderRadius:10,padding:"16px 48px",fontSize:16,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(22,163,74,0.3)"}}>

          </div>

  // ─── SCREEN 4: OFFER LETTER ────────────────────────────────────────
  if (step==="offer" && sel) {
    const l=sel;
    const ca=compBased(l,COMPARABLES);
    const mf=multiFactor(l);
    const of=reconcile(ca.price,mf.price,l);
    const offerPrice = manualOfferPrice > 0 ? manualOfferPrice : of.rec;
    const offerSave = l.price - offerPrice;
    const offerSavePct = ((offerSave / l.price) * 100).toFixed(1);
    const today = new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});

    const reasons = [

      l.priceReductions.length>0 && "The listing has undergone "+l.priceReductions.length+" price reduction(s) totaling $"+(l.originalPrice-l.price).toLocaleString()+" from the original list price of $"+l.originalPrice.toLocaleString()+", demonstrating seller flexibility.",
      l.floodRisk!=="Minimal" && "The property is located in FEMA Flood Zone "+l.floodZone+" ("+l.floodRisk+" risk), which requires additional flood insurance estimated at $"+(l.floodRisk==="High"?"2,500-4,500":"800-1,500")+"/year and limits the pool of eligible buyers.",
      l.foreclosure && "The property is bank-owned (foreclosure), which typically involves as-is condition and may require significant renovation investment by the buyer.",
      l.lisPendens && "A lis pendens has been filed against this property, indicating pending litigation that creates title uncertainty and additional risk for the buyer.",
      l.permits.open>0 && "There are "+l.permits.open+" open building permit(s) on the property, which may indicate incomplete work and could complicate financing or insurance.",

      MARKET.priceChangeYoY<0 && "Area home prices have declined "+MARKET.priceChangeYoY+"% year-over-year, with "+MARKET.monthlyInventory+" months of inventory indicating a buyer-favorable market.",
      "The county tax assessed value is $"+l.taxAssessed.toLocaleString()+", which is "+Math.abs(((l.price/l.taxAssessed-1)*100)).toFixed(1)+"% "+(l.price>l.taxAssessed?"above":"below")+" the current list price.",

    ].filter(Boolean);

    return (

          <div className="card print-page" style={{padding:"48px 48px",lineHeight:1.7,fontSize:12,color:"#374151"}}>

            <div style={{textAlign:"center",marginBottom:24,borderBottom:"2px solid #1e40af",paddingBottom:16}}>
              <h1 style={{fontSize:20,fontWeight:700,color:"#1e40af",margin:0,letterSpacing:1}}>RESIDENTIAL SALE AND PURCHASE CONTRACT</h1>
              <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>State of Florida | {countyName || "___________"} County | Date: {today}</p>
              <p style={{fontSize:10,color:"#9ca3af",margin:"2px 0 0"}}>Generated by PropertyAgent Pro — This document is intended to be reviewed by a licensed real estate attorney prior to execution.</p>
            </div>

            {/* I. PARTIES */}
            {pSect("I. PARTIES TO THIS CONTRACT")}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginBottom:16}}>
              <div style={{background:"#f9fafb",borderRadius:8,padding:14}}>
                <p style={{fontSize:11,fontWeight:700,color:"#1e40af",margin:"0 0 6px"}}>BUYER</p>
                <p style={{margin:0}}><strong>{buyerInfo.name || "________________________"}</strong></p>
                <p style={{margin:0,color:"#6b7280"}}>{buyerInfo.address ? buyerInfo.address+", "+buyerInfo.city+", "+buyerInfo.state+" "+buyerInfo.zip : "________________________"}</p>
                <p style={{margin:0,color:"#6b7280"}}>{buyerInfo.phone || "(___) ___-____"} | {buyerInfo.email || "________________________"}</p>
                {hasBuyerAgent && buyerInfo.agent ? <p style={{margin:"6px 0 0",fontSize:11,color:"#6b7280"}}>Agent: {buyerInfo.agent} (Lic# {buyerInfo.agentLicense || "______"}) | {buyerInfo.agentPhone}</p> : <p style={{margin:"6px 0 0",fontSize:11,color:"#6b7280",fontStyle:"italic"}}>Buyer is self-represented (no buyer's agent)</p>}
                {hasBuyerAgent && buyerInfo.brokerage && <p style={{margin:0,fontSize:11,color:"#6b7280"}}>Brokerage: {buyerInfo.brokerage} (Lic# {buyerInfo.brokerageLicense || "______"})</p>}
              </div>
              <div style={{background:"#f9fafb",borderRadius:8,padding:14}}>
                <p style={{fontSize:11,fontWeight:700,color:"#1e40af",margin:"0 0 6px"}}>SELLER</p>
                <p style={{margin:0}}><strong>{sellerInfo.name || "________________________"}</strong></p>
                <p style={{margin:0,color:"#6b7280"}}>{sellerInfo.address || "________________________"}</p>
                {sellerInfo.agent && <p style={{margin:"6px 0 0",fontSize:11,color:"#6b7280"}}>Listing Agent: {sellerInfo.agent} (Lic# {sellerInfo.agentLicense || "______"}) | {sellerInfo.agentPhone}</p>}
                {sellerInfo.brokerage && <p style={{margin:0,fontSize:11,color:"#6b7280"}}>Brokerage: {sellerInfo.brokerage}</p>}
              </div>
            </div>

            {/* II. PROPERTY DESCRIPTION */}
            {pSect("II. PROPERTY DESCRIPTION")}
            <p>Buyer hereby offers to purchase the following described real property:</p>
            <div style={{background:"#f9fafb",borderRadius:8,padding:14,marginBottom:8}}>
              <p style={{margin:0}}><strong>Street Address:</strong> {l.address}, {l.city}, {l.state} {l.zip}</p>
              <p style={{margin:0}}><strong>County:</strong> {countyName || "___________"} | <strong>Tax Parcel ID:</strong> {taxParcelId || "________________________"}</p>
              <p style={{margin:0}}><strong>Property Type:</strong> {l.type} | <strong>Year Built:</strong> {l.yearBuilt} | <strong>Living Area:</strong> {l.sqft.toLocaleString()} sq ft | <strong>Bedrooms:</strong> {l.beds} | <strong>Bathrooms:</strong> {l.baths} | <strong>Lot Size:</strong> {l.lotSize>0?l.lotSize+" acres":"N/A (Condo)"}</p>
              <p style={{margin:"6px 0 0"}}><strong>Legal Description:</strong> {legalDescription || "As recorded in the public records of "+countyName+" County, Florida. Full legal description to be provided by title company and incorporated herein by reference."}</p>
            </div>

            {/* III. PURCHASE PRICE & FINANCING */}
            {pSect("III. PURCHASE PRICE & FINANCING")}
            <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:16,marginBottom:8}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                <p style={{margin:0}}><strong>A. Purchase Price:</strong> <span style={{fontSize:15,fontWeight:700,color:"#1e40af"}}>${offerPrice.toLocaleString()}</span></p>
                <p style={{margin:0}}><strong>B. List Price:</strong> <span style={{textDecoration:"line-through",color:"#ef4444"}}>${l.price.toLocaleString()}</span></p>
                <p style={{margin:0}}><strong>C. Financing Type:</strong> {financingType}</p>
                <p style={{margin:0}}><strong>D. Loan Amount:</strong> ${loanAmt.toLocaleString()}</p>
                <p style={{margin:0}}><strong>E. Down Payment:</strong> ${form.downPayment.toLocaleString()} ({((form.downPayment/offerPrice)*100).toFixed(1)}%)</p>
                <p style={{margin:0}}><strong>F. Loan Term:</strong> {loanTerm} years</p>
                <p style={{margin:0}}><strong>G. Interest Rate Not to Exceed:</strong> {interestRateCap}% per annum</p>
                <p style={{margin:0}}><strong>H. Pre-Approval:</strong> {preApproval?"Attached / to be provided within 5 days":"Not attached"}</p>
                {sellerConcessions>0 && <p style={{margin:0}}><strong>I. Seller Concessions:</strong> ${sellerConcessions.toLocaleString()} toward Buyer's closing costs</p>}
              </div>
            </div>
            {financingType!=="Cash (No Financing)" && <p>Buyer shall apply for financing within 5 calendar days of the Effective Date and use good faith and diligent effort to obtain approval. If Buyer is unable to obtain a firm loan commitment within the time period specified in the Financing Contingency below, Buyer may terminate this Contract and receive a full refund of the Earnest Money Deposit.</p>}

            {/* IV. EARNEST MONEY / ESCROW */}
            {pSect("IV. EARNEST MONEY DEPOSIT & ESCROW")}
            <p><strong>A. Initial Deposit:</strong> ${earnestMoney.toLocaleString()} to be delivered to Escrow Agent within {depositDeadline} calendar day(s) of the Effective Date.</p>
            {additionalDeposit>0 && <p><strong>B. Additional Deposit:</strong> ${additionalDeposit.toLocaleString()} to be delivered within 10 calendar days of the Effective Date.</p>}
            <p><strong>{additionalDeposit>0?"C":"B"}. Escrow Agent:</strong> {escrowAgent || "________________________ (to be designated by ________________________)"}</p>
            <p>Escrow Agent shall hold all deposits in a non-interest-bearing escrow account in accordance with Florida Statute 475.25. Upon closing, the Earnest Money Deposit shall be applied to the purchase price. In the event of a dispute regarding the Earnest Money Deposit, Escrow Agent shall comply with applicable Florida law, including but not limited to interpleader action, and shall not be liable to either party for any act or omission in handling the disputed funds.</p>

            {/* V. TITLE & SURVEY */}
            {pSect("V. TITLE EVIDENCE & SURVEY")}
            <p><strong>A. Title Evidence:</strong> {titlePaidBy} shall, at {titlePaidBy}'s expense, obtain a title insurance commitment from {titleCompany || "a Florida-licensed title insurance company"} within 15 calendar days of the Effective Date. Seller shall convey marketable and insurable title to the Property by {deedType}, subject only to matters acceptable to Buyer and Buyer's lender.</p>
            <p><strong>B. Title Defects:</strong> If title defects are found that render title unmarketable or uninsurable, Seller shall have 30 calendar days from notice to cure such defects. If Seller is unable to cure title defects within such period, Buyer may: (i) accept title as-is; (ii) extend the cure period; or (iii) terminate this Contract with full refund of the Earnest Money Deposit.</p>
            {surveyRequired && <p><strong>C. Survey:</strong> Buyer may, at Buyer's expense, obtain a current survey of the Property. If the survey reveals encroachments, boundary line disputes, easements, or other conditions unacceptable to Buyer, the matter shall be treated as a title defect.</p>}
            <p><strong>{surveyRequired?"D":"C"}. Deed:</strong> At closing, Seller shall deliver a duly executed {deedType} conveying the Property to Buyer, free and clear of all liens, encumbrances, and assessments except those specifically accepted by Buyer.</p>

            {/* VI. CONTINGENCIES */}
            {pSect("VI. CONTINGENCIES")}
            <p>This Contract is subject to the following contingencies. Failure to satisfy any contingency within the specified period shall entitle the Buyer to terminate this Contract by written notice and receive a full refund of the Earnest Money Deposit, unless otherwise specified herein.</p>
            {activeContingencies.map((c,i)=>(
              <div key={c.id} style={{marginBottom:14,paddingLeft:14,borderLeft:"3px solid #bfdbfe"}}>
                <p style={{fontWeight:600,color:"#111827",margin:"0 0 2px"}}>{i+1}. {c.label} — {c.days} Calendar Days</p>
                <p style={{margin:0,color:"#4b5563"}}>{c.text.replace(/{days}/g,c.days).replace(/{price}/g,"$"+offerPrice.toLocaleString())}</p>
              </div>
            ))}
            {customContingencies.map((cc,i)=>(
              <div key={"cc"+i} style={{marginBottom:14,paddingLeft:14,borderLeft:"3px solid #bfdbfe"}}>
                <p style={{fontWeight:600,color:"#111827",margin:"0 0 2px"}}>{activeContingencies.length+i+1}. Additional Contingency</p>
                <p style={{margin:0,color:"#4b5563"}}>{cc}</p>
              </div>
            ))}

            {/* VII. PERSONAL PROPERTY */}
            {pSect("VII. PERSONAL PROPERTY & FIXTURES")}
            <p><strong>A. Included:</strong> The following items, if existing on the Property as of the date of this offer, are included in the purchase price and shall be transferred to Buyer at closing free and clear of all liens: {personalPropertyIncluded || "________________________"}</p>
            {personalPropertyExcluded && <p><strong>B. Excluded:</strong> The following items are specifically excluded from this sale and shall be retained by Seller: {personalPropertyExcluded}</p>}
            <p>All items included herein shall be in working condition at the time of closing, ordinary wear and tear excepted.</p>

            {/* VIII. PRORATIONS & CLOSING COSTS */}
            {pSect("VIII. PRORATIONS, ADJUSTMENTS & CLOSING COSTS")}
            <p>The following items shall be prorated as of the day before closing and adjusted accordingly:</p>
            <p><strong>A.</strong> Real property taxes for the current year shall be prorated based on the current year's tax bill (or prior year if current is unavailable). County: {countyName} | Annual Tax: ${l.annualTax.toLocaleString()} ({l.taxYear}).</p>
            {l.hoa>0 && <p><strong>B.</strong> Homeowner/Condominium Association dues and any pending special assessments shall be prorated. Current HOA: ${l.hoa.toLocaleString()}/month.</p>}
            <p><strong>{l.hoa>0?"C":"B"}.</strong> Utility deposits and prepaid utility charges shall be adjusted at closing.</p>
            <p><strong>Florida-Specific Closing Costs:</strong> Documentary stamp tax on the deed shall be paid by Seller per Florida law. Documentary stamp tax and intangible tax on the mortgage/note shall be paid by Buyer. Title insurance premium shall be paid by {titlePaidBy}. Recording fees shall be paid by the party for whose benefit the instrument is recorded.</p>

            {/* IX. CLOSING & POSSESSION */}
            {pSect("IX. CLOSING & POSSESSION")}
            <p><strong>A. Closing Date:</strong> On or before {closingDays} calendar days from the Effective Date of this Contract, or such other date as may be mutually agreed upon in writing by the parties.</p>
            <p><strong>B. Closing Location:</strong> At the offices of the Escrow Agent / Title Company, or by remote / mail-away closing as agreed by the parties. Remote online notarization is permitted under Florida law.</p>
            <p><strong>C. Possession:</strong> Buyer shall receive possession of the Property: <strong>{possessionAt}</strong>. If Seller fails to deliver possession on the agreed date, Seller shall pay Buyer a per diem amount equal to the Buyer's projected daily housing cost for each day of delay.</p>
            {walkthrough && <p><strong>D. Pre-Closing Walk-Through:</strong> Buyer shall have the right to conduct a walk-through inspection of the Property within 24 hours prior to closing to verify that the Property is in the condition required by this Contract, that all repairs have been completed, and that all included personal property remains on the premises.</p>}

            {/* X. SELLER DISCLOSURES */}
            {pSect("X. SELLER DISCLOSURES")}
            <p><strong>A. Seller's Property Disclosure:</strong> Seller shall provide a written disclosure of all known facts that materially affect the value of the Property that are not readily observable, in accordance with the Florida Supreme Court ruling in <em>Johnson v. Davis</em>, 480 So. 2d 625 (Fla. 1985). Seller's failure to disclose known material defects may constitute fraud.</p>
            <p><strong>B. Code Violations & Open Permits:</strong> Seller represents that there are {l.permits.open>0?l.permits.open+" known open permit(s)":"no known open permits or code violations"} on the Property. Seller shall disclose all known code violations, open or expired building permits, and pending governmental actions.</p>
            {l.yearBuilt<1978 && <>
              <p><strong>C. Lead-Based Paint Disclosure (Federal):</strong> The Property was built prior to 1978. In accordance with 42 U.S.C. 4852d and 24 CFR Part 35, Seller shall provide Buyer with any known information regarding the presence of lead-based paint or lead-based paint hazards, the EPA pamphlet "Protect Your Family From Lead in Your Home," and a 10-day period to conduct a lead-based paint inspection at Buyer's expense.</p>
            </>}
            <p><strong>{l.yearBuilt<1978?"D":"C"}. Homeowners/Condominium Association:</strong> {l.hoa>0?"The Property is subject to a mandatory association. Seller shall provide all governing documents, financial statements, bylaws, rules and regulations, and disclosure of pending assessments. Per Florida Statute 720.401, Buyer shall have 3 calendar days after receipt of HOA disclosure documents to cancel this Contract.":"Seller represents that the Property is not subject to a mandatory homeowners or condominium association, or if it is, Seller shall disclose and provide all governing documents."}</p>

            {/* XI. FLORIDA STATUTORY DISCLOSURES */}
            {pSect("XI. FLORIDA STATUTORY DISCLOSURES")}
            <div style={{background:"#fefce8",border:"1px solid #fde68a",borderRadius:8,padding:14,marginBottom:12}}>
              <p style={{fontWeight:700,margin:"0 0 6px",color:"#854d0e"}}>RADON GAS DISCLOSURE (Florida Statute 404.056(5))</p>
              <p style={{margin:0,fontSize:11,fontStyle:"italic"}}>RADON GAS: Radon is a naturally occurring radioactive gas that, when it has accumulated in a building in sufficient quantities, may present health risks to persons who are exposed to it over time. Levels of radon that exceed federal and state guidelines have been found in buildings in Florida. Additional information regarding radon and radon testing may be obtained from your county health department.</p>
            </div>
            <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:14,marginBottom:12}}>
              <p style={{fontWeight:700,margin:"0 0 6px",color:"#166534"}}>ENERGY EFFICIENCY DISCLOSURE (Florida Statute 553.996)</p>
              <p style={{margin:0,fontSize:11,fontStyle:"italic"}}>Buyer is hereby notified that Buyer may have the Property inspected for energy efficiency. Buyer is encouraged to obtain an energy efficiency rating on the Property.</p>
            </div>
            <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:14,marginBottom:12}}>
              <p style={{fontWeight:700,margin:"0 0 6px",color:"#1e40af"}}>PROPERTY TAX DISCLOSURE (Florida Statute 689.261)</p>
              <p style={{margin:0,fontSize:11,fontStyle:"italic"}}>BUYER SHOULD NOT RELY ON THE SELLER'S CURRENT PROPERTY TAXES AS THE AMOUNT OF PROPERTY TAXES THAT THE BUYER MAY BE OBLIGATED TO PAY IN THE YEAR SUBSEQUENT TO PURCHASE. A CHANGE OF OWNERSHIP OR PROPERTY IMPROVEMENTS TRIGGERS REASSESSMENTS OF THE PROPERTY THAT COULD RESULT IN HIGHER PROPERTY TAXES. IF YOU HAVE ANY QUESTIONS CONCERNING VALUATION, CONTACT THE COUNTY PROPERTY APPRAISER'S OFFICE FOR INFORMATION.</p>
            </div>
            <p><strong>Flood Zone:</strong> The Property is located in FEMA Flood Zone <strong>{l.floodZone}</strong> ({l.floodRisk} risk), FEMA Panel {l.femaPanel}. {l.floodRisk==="High"?"Federal law requires flood insurance for properties in Special Flood Hazard Areas when financed by a federally backed mortgage.":l.floodRisk==="Moderate"?"Flood insurance is recommended but may not be required by lender.":"No flood insurance is required at this time."} Buyer is advised to verify flood zone status independently, as FEMA maps may be revised. Per Florida Statute 627.7073, Buyer may also inquire regarding sinkhole activity in this area.</p>
            <p><strong>FIRPTA Notice:</strong> If Seller is a "foreign person" as defined by the Foreign Investment in Real Property Tax Act (FIRPTA), Buyer may be required to withhold up to 15% of the gross sales price at closing and remit to the IRS, unless an exemption applies. Seller shall notify Buyer prior to closing if Seller is a foreign person.</p>
            <p><strong>Agency Disclosure (Florida Statute 475.278):</strong> The parties acknowledge that the brokerage relationship(s) in this transaction have been disclosed as required by Florida law. {hasBuyerAgent ? "Buyer's broker is acting as: [ ] Transaction Broker [ ] Single Agent [ ] No Brokerage Relationship." : "Buyer is self-represented and is not working with a licensed real estate agent or broker. Buyer acknowledges that the listing agent/broker represents the Seller's interests."} Seller's broker is acting as: [ ] Transaction Broker [ ] Single Agent [ ] No Brokerage Relationship.</p>

            {/* XII. DEFAULT & REMEDIES */}
            {pSect("XII. DEFAULT & REMEDIES")}
            <p><strong>A. Buyer Default:</strong> If Buyer fails to perform any obligation under this Contract within the time specified, after written notice and a reasonable cure period, Seller may elect to: (i) retain the Earnest Money Deposit as agreed-upon liquidated damages, which shall be Seller's sole and exclusive remedy; or (ii) seek specific performance of this Contract.</p>
            <p><strong>B. Seller Default:</strong> If Seller fails to perform any obligation under this Contract within the time specified, after written notice and a reasonable cure period, Buyer may elect to: (i) receive a full refund of the Earnest Money Deposit; (ii) seek specific performance; or (iii) seek damages from Seller.</p>
            <p><strong>C. Dispute Resolution:</strong> In the event of a dispute arising out of this Contract, the parties agree to first attempt resolution through <strong>{disputeResolution.split(" then ")[0].toLowerCase()}</strong>. If mediation is unsuccessful, the parties may proceed to <strong>{disputeResolution.split(" then ")[1]?disputeResolution.split(" then ")[1].toLowerCase():"litigation"}</strong>. The prevailing party in any litigation or arbitration shall be entitled to recover reasonable attorney's fees and costs from the non-prevailing party.</p>

            {/* XIII. STANDARD PROVISIONS */}
            {pSect("XIII. STANDARD PROVISIONS")}
            <p><strong>A. Time is of the Essence:</strong> Time is of the essence for all dates and deadlines in this Contract.</p>
            <p><strong>B. Risk of Loss:</strong> If the Property is damaged by fire or other casualty before closing, Buyer may: (i) accept the Property in its damaged condition with an assignment of insurance proceeds; or (ii) terminate this Contract with a full refund of the Earnest Money Deposit if the cost of restoration exceeds 1.5% of the purchase price.</p>
            <p><strong>C. Assignment:</strong> This Contract {assignable?"may be assigned by Buyer to a third party upon written notice to Seller. Buyer shall remain liable under this Contract unless Seller provides a written release.":"may not be assigned by Buyer without the prior written consent of Seller."}</p>
            <p><strong>D. Governing Law:</strong> This Contract shall be governed by and construed in accordance with the laws of the State of Florida. Venue for any action shall be in {countyName || "___________"} County, Florida.</p>
            <p><strong>E. Entire Agreement:</strong> This Contract, together with all addenda and exhibits attached hereto, constitutes the entire agreement between the parties. No prior or contemporaneous agreements or representations shall be binding unless incorporated herein. This Contract may not be modified except by written agreement signed by all parties.</p>
            <p><strong>F. Severability:</strong> If any provision of this Contract is held invalid or unenforceable, the remaining provisions shall continue in full force and effect.</p>
            <p><strong>G. Counterparts & Electronic Signatures:</strong> This Contract may be executed in counterparts, each of which shall be deemed an original. Electronic signatures are valid and enforceable pursuant to the Uniform Electronic Transactions Act (UETA) and the federal E-SIGN Act.</p>
            <p><strong>H. Notices:</strong> All notices required under this Contract shall be in writing and delivered by personal delivery, overnight courier, or email to the addresses listed in Section I above. Notice shall be deemed given upon receipt.</p>
            <p><strong>I. Survival:</strong> Any provision of this Contract that by its nature should survive closing (including representations, warranties, indemnifications, and dispute resolution provisions) shall survive the delivery of the deed and the payment of the purchase price.</p>
            <p><strong>J. Force Majeure:</strong> Neither party shall be liable for delay caused by acts of God, government action, natural disaster, or other events beyond the reasonable control of the parties. Deadlines affected by force majeure events shall be extended by the duration of such event.</p>
            <p><strong>K. Fair Housing:</strong> This transaction is subject to all applicable federal, state, and local fair housing laws, including the Fair Housing Act (42 U.S.C. 3601 et seq.) and the Florida Fair Housing Act (Florida Statute 760.20-760.37).</p>
            <p><strong>L. 1031 Exchange:</strong> Either party may structure the transaction as a tax-deferred exchange under Section 1031 of the Internal Revenue Code, provided the exchange does not delay closing, increase the other party's costs, or impose additional liability on the other party.</p>

            {/* HOME WARRANTY */}
            {homeWarranty && <>
              {pSect("XIV. HOME WARRANTY")}
              <p>{homeWarrantyPaidBy} shall pay for a home warranty plan not to exceed ${homeWarrantyAmount.toLocaleString()}, to be issued at closing. The home warranty shall cover major systems and appliances for a period of one (1) year from the date of closing.</p>
            </>}

            {/* OFFER PRICE JUSTIFICATION */}
            {pSect((homeWarranty?"XV":"XIV")+". OFFER PRICE JUSTIFICATION — EXHIBIT A")}
            <p>The offer price of <strong>${offerPrice.toLocaleString()}</strong> ({offerSavePct}% below list price of ${l.price.toLocaleString()}) is supported by the following market data and property analysis:</p>
            {reasons.map((r,i)=>(
              <div key={i} style={{marginBottom:8,paddingLeft:14,borderLeft:"3px solid #d1d5db"}}>
                <p style={{margin:0}}>{i+1}. {r}</p>
              </div>
            ))}
            <div style={{background:"#f9fafb",borderRadius:8,padding:14,marginTop:12,marginBottom:16}}>
              <p style={{margin:0}}>
                <strong>Valuation Summary:</strong> Two independent pricing methodologies were employed. The comparable sales analysis yielded ${ca.price.toLocaleString()} and the multi-factor scoring model yielded ${mf.price.toLocaleString()}.{manualOfferPrice > 0 && manualOfferPrice !== of.rec ? " The Buyer has elected an offer price of $"+offerPrice.toLocaleString()+"." : " The reconciled offer price of $"+offerPrice.toLocaleString()+" represents the midpoint of these two analyses."} Confidence level: <strong>{of.conf}</strong>.
              </p>
            </div>

            {/* ADDITIONAL TERMS */}
            {additionalTerms && <>
              {pSect((homeWarranty?"XVI":"XV")+". ADDITIONAL TERMS & SPECIAL PROVISIONS")}
              <p style={{whiteSpace:"pre-wrap"}}>{additionalTerms}</p>
            </>}

            {/* ACCEPTANCE & OFFER EXPIRATION */}
            {pSect((homeWarranty?(additionalTerms?"XVII":"XVI"):(additionalTerms?"XVI":"XV"))+". ACCEPTANCE, COUNTEROFFER & EXPIRATION")}
            <p><strong>A. Offer Expiration:</strong> This offer shall expire at 11:59 PM Eastern Time on the date that is {offerExpDays} calendar day(s) from the date of this Contract, unless accepted or countered in writing by Seller prior to that time.</p>
            <p><strong>B. Effective Date:</strong> The "Effective Date" of this Contract shall be the date on which the last party signs or initials this Contract or the final counteroffer, whichever is later.</p>
            <p><strong>C. Counteroffer:</strong> Seller may accept this offer, reject this offer, or present a written counteroffer. A counteroffer shall constitute a rejection of this original offer. Buyer shall have _______ calendar days to accept any counteroffer.</p>

            {/* SIGNATURES */}
            <div style={{borderTop:"2px solid #1e40af",paddingTop:24,marginTop:32}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:40,marginBottom:32}}>
                <div>
                  <p style={{fontWeight:700,color:"#1e40af",margin:"0 0 40px"}}>BUYER:</p>
                  <div style={{borderBottom:"1px solid #111827",marginBottom:4}}/>
                  <p style={{fontSize:11,color:"#6b7280",margin:0}}>Signature</p>
                  <p style={{margin:"8px 0 0"}}>{buyerInfo.name || "________________________"}</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Printed Name</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"8px 0 0"}}>Date: ________________________</p>
                  <div style={{marginTop:24,borderBottom:"1px solid #111827",marginBottom:4}}/>
                  <p style={{fontSize:11,color:"#6b7280",margin:0}}>Co-Buyer Signature (if applicable)</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Printed Name: ________________________</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Date: ________________________</p>
                </div>
                <div>
                  <p style={{fontWeight:700,color:"#1e40af",margin:"0 0 40px"}}>SELLER:</p>
                  <div style={{borderBottom:"1px solid #111827",marginBottom:4}}/>
                  <p style={{fontSize:11,color:"#6b7280",margin:0}}>Signature</p>
                  <p style={{margin:"8px 0 0"}}>{sellerInfo.name || "________________________"}</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Printed Name</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"8px 0 0"}}>Date: ________________________</p>
                  <div style={{marginTop:24,borderBottom:"1px solid #111827",marginBottom:4}}/>
                  <p style={{fontSize:11,color:"#6b7280",margin:0}}>Co-Seller Signature (if applicable)</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Printed Name: ________________________</p>
                  <p style={{fontSize:11,color:"#6b7280",margin:"4px 0 0"}}>Date: ________________________</p>
                </div>
              </div>

              <div style={{display:"grid",gridTemplateColumns:hasBuyerAgent?"1fr 1fr":"1fr",gap:40}}>
                {hasBuyerAgent && (
                <div>
                  <p style={{fontWeight:600,color:"#374151",margin:"0 0 30px",fontSize:11}}>BUYER'S AGENT / BROKER:</p>
                  <div style={{borderBottom:"1px solid #9ca3af",marginBottom:4}}/>
                  <p style={{fontSize:10,color:"#6b7280",margin:0}}>Agent Signature</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"4px 0 0"}}>Name: {buyerInfo.agent||"________________________"} | License #: {buyerInfo.agentLicense||"____________"}</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"2px 0 0"}}>Brokerage: {buyerInfo.brokerage||"________________________"} | Date: ________________________</p>
                </div>
                )}
                <div>
                  <p style={{fontWeight:600,color:"#374151",margin:"0 0 30px",fontSize:11}}>SELLER'S AGENT / BROKER:</p>
                  <div style={{borderBottom:"1px solid #9ca3af",marginBottom:4}}/>
                  <p style={{fontSize:10,color:"#6b7280",margin:0}}>Agent Signature</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"4px 0 0"}}>Name: {sellerInfo.agent||"________________________"} | License #: {sellerInfo.agentLicense||"____________"}</p>
                  <p style={{fontSize:10,color:"#6b7280",margin:"2px 0 0"}}>Brokerage: {sellerInfo.brokerage||"________________________"} | Date: ________________________</p>
                </div>
              </div>
            </div>

            <div style={{textAlign:"center",marginTop:32,paddingTop:16,borderTop:"1px solid #e5e7eb"}}>
              <p style={{fontSize:10,color:"#9ca3af",margin:0,lineHeight:1.6}}>This Residential Sale and Purchase Contract was generated by PropertyAgent Pro. This document is designed to conform to the standards and structure of the Florida Realtors / Florida Bar Residential Contract. However, it has not been reviewed by the Florida Bar or the Florida Association of Realtors. <strong>BOTH BUYER AND SELLER ARE STRONGLY ADVISED TO CONSULT WITH A LICENSED FLORIDA REAL ESTATE ATTORNEY BEFORE EXECUTING THIS CONTRACT.</strong> This document does not constitute legal advice. This Contract is not binding until signed by all parties and delivered.</p>
            </div>
          </div>

          {/* Print button bottom */}
          <div className="no-print" style={{textAlign:"center",marginTop:24,marginBottom:48}}>
            <button onClick={handlePrint}
              style={{background:"linear-gradient(135deg,#2563eb,#1e40af)",color:"#fff",border:"none",borderRadius:10,padding:"14px 48px",fontSize:15,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(37,99,235,0.3)",display:"inline-flex",alignItems:"center",gap:8}}>
              <PrintIcon/> Print Contract / Save as PDF
            </button>
            <p style={{fontSize:12,color:"#6b7280",marginTop:8}}>{hasPaid ? "Tip: Choose \"Save as PDF\" in the print dialog to save a digital copy" : "One-time fee of $"+OFFER_FEE+" required to print"}</p>
          </div>
        </div>
        <PayModal/>
      </div>
    );
  }

  return null;
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
